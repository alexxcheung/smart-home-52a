        cur: "{{ (state_attr('humidifier.probreeze_dehumidifier', 'humidity') if state_attr('humidifier.probreeze_dehumidifier', 'humidity') is not none else states('input_number.hemma_dehumidifier_target_humidity')) | int(50) }}"
