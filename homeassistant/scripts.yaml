# Scripts used by Hemma dashboard and other automations.
# Start uses home_connect.set_program_and_options with program + delay in one call (reference format).

# Thermostat: sync target temp from climate entity and toggle overlay
hemma_thermostat_open_overlay:
  alias: "Hemma Thermostat Open Overlay"
  fields:
    climate_entity:
      description: "Climate entity to get target temperature from"
    toggle_helper:
      description: "Input boolean to toggle"
  sequence:
    - action: input_number.set_value
      target:
        entity_id: input_number.hemma_thermostat_target_temperature
      data:
        value: "{{ state_attr(climate_entity, 'temperature') | float(22) }}"
    - action: input_boolean.toggle
      target:
        entity_id: "{{ toggle_helper }}"

# Dehumidifier: −/+ call humidifier.set_humidity on the unit (30–80 %). Helper is updated for fast UI.
# Current target: device attribute if present, else synced input_number (e.g. unit offline).
hemma_dehumidifier_humidity_minus_1:
  alias: "Dehumidifier target −1 (device)"
  sequence:
    - variables:
        cur: "{{ (state_attr('humidifier.probreeze_dehumidifier', 'humidity') if state_attr('humidifier.probreeze_dehumidifier', 'humidity') is not none else states('input_number.hemma_dehumidifier_target_humidity')) | int(50) }}"
        new_h: "{{ [[cur - 1, 30] | max, 80] | min }}"
    - action: humidifier.set_humidity
      target:
        entity_id: humidifier.probreeze_dehumidifier
      data:
        humidity: "{{ new_h }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.hemma_dehumidifier_target_humidity
      data:
        value: "{{ new_h }}"
