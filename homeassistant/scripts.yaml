# Optional: push the synced helper value to the unit (e.g. after editing the helper elsewhere).
hemma_dehumidifier_target_apply:
  alias: "Dehumidifier - Apply helper target to device"
  sequence:
    - action: humidifier.set_humidity
      target:
        entity_id: humidifier.probreeze_dehumidifier
      data:
        humidity: "{{ states('input_number.hemma_dehumidifier_target_humidity') | int }}"

# Thermostat: set temperature and close overlay
hemma_thermostat_set_and_close:
  alias: "Hemma Thermostat Set and Close"
  fields:
    climate_entity:
      description: "Climate entity to set temperature on"
    toggle_helper:
      description: "Input boolean to turn off"
  sequence:
    - action: climate.set_temperature
      target:
        entity_id: "{{ climate_entity }}"
      data:
        temperature: "{{ states('input_number.hemma_thermostat_target_temperature') | float }}"
    - action: input_boolean.turn_off
      target:
        entity_id: "{{ toggle_helper }}"

# Start immediately: delay 0, programme from select
start_dishwasher_now:
  alias: "Start Dishwasher Now"
  sequence:
    - action: home_connect.set_program_and_options
      data:
        device_id: 919d3f00e9c673b530063b28e7189865
        affects_to: active_program
        program: "{{ states('select.bosch_dishwasher_selected_programme') }}"
        b_s_h_common_option_start_in_relative: "0"

# Start now or at [time]: if delay-start toggle is on, use "Start at" time; otherwise delay 0.
start_dishwasher:
  alias: "Start Dishwasher"
  sequence:
    - action: home_connect.set_program_and_options
      data:
        device_id: 919d3f00e9c673b530063b28e7189865
        affects_to: active_program
        program: "{{ states('select.bosch_dishwasher_selected_programme') }}"
        b_s_h_common_option_start_in_relative: >
          {% if states('input_boolean.hemma_dishwasher_delay_start') != 'on' %}
            0
          {% else %}
            {% set t_raw = states('input_datetime.hemma_dishwasher_start_at') %}
            {% set t = t_raw ~ ':00' if (t_raw.split(':') | length) == 2 else t_raw %}
            {% set tt = as_timestamp(strptime(t ~ ' ' ~ now().strftime('%Y-%m-%d'), '%H:%M:%S %Y-%m-%d')) %}
            {% set nt = as_timestamp(now()) %}
            {% set diff = (tt - nt) | int %}
            {% set secs = (diff if diff > 0 else diff + 86400) %}
            {{ secs if secs > 60 else 0 }}
          {% endif %}

# Washer: FinishInRelative (seconds), not hour-based delayed_end / relative_hour_to_stop.
# "Start at" → finish_in_relative = seconds_until_start + program duration (total time, minutes).
# program: must match home_connect enum (e.g. laundry_care_washer_program_cotton). Tries selected then active select; prefixes short slugs.
# If validation still fails, set the first entity_id below to your real "Selected program" select (Settings → Devices → Washer).
start_washer:
  alias: "Start Washer"
  sequence:
    - action: home_connect.set_program_and_options
      data:
        device_id: "{{ device_id('select.washer_operation') }}"
        affects_to: active_program
        program: >
          {% set ns = namespace(p='') %}
          {% for eid in ['select.washer_selected_program', 'select.washer_active_program'] %}
            {% if ns.p == '' %}
              {% set s = states(eid) | default('', true) | trim %}
              {% if s not in ['unknown', 'unavailable', 'none', ''] %}
                {% set ns.p = s %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {% set raw = ns.p %}
          {% if raw.startswith('laundry_care_') %}
            {{ raw }}
          {% elif raw %}
            laundry_care_washer_program_{{ raw }}
          {% else %}
            {{ raw }}
          {% endif %}
        b_s_h_common_option_finish_in_relative: >
          {% set dur_min = states('sensor.washer_total_time') | float(0) %}
          {% set dur_sec = (dur_min * 60) | int %}
          {% if dur_sec < 60 %}
            {% set dur_sec = 7200 %}
          {% endif %}
          {% if states('input_boolean.hemma_washer_delay_start') != 'on' %}
            {{ dur_sec }}
          {% else %}
            {% set t_raw = states('input_datetime.hemma_washer_start_at') %}
            {% set t = t_raw ~ ':00' if (t_raw.split(':') | length) == 2 else t_raw %}
            {% set tt = as_timestamp(strptime(t ~ ' ' ~ now().strftime('%Y-%m-%d'), '%H:%M:%S %Y-%m-%d')) %}
            {% set nt = as_timestamp(now()) %}
            {% set diff = (tt - nt) | int %}
            {% set secs_start = (diff if diff > 0 else diff + 86400) %}
            {% set secs_start = secs_start if secs_start > 60 else 0 %}
            {{ secs_start + dur_sec }}
          {% endif %}
