# Optional: push the synced helper value to the unit (e.g. after editing the helper elsewhere).
hemma_dehumidifier_target_apply:
  alias: "Dehumidifier - Apply helper target to device"
  sequence:
    - variables:
        dehumidifier: "{{ state_attr('sensor.hemma_entity_ids', 'dehumidifier') }}"
        target_helper: "{{ state_attr('sensor.hemma_entity_ids', 'dehumidifier_target_humidity') }}"
    - action: humidifier.set_humidity
      target:
        entity_id: "{{ dehumidifier }}"
      data:
        humidity: "{{ states(target_helper) | int }}"

# Thermostat: set temperature and close overlay
hemma_thermostat_set_and_close:
  alias: "Hemma Thermostat Set and Close"
  fields:
    climate_entity:
      description: "Climate entity to set temperature on"
    toggle_helper:
      description: "Input boolean to turn off"
  sequence:
    - action: climate.set_temperature
      target:
        entity_id: "{{ climate_entity }}"
      data:
        temperature: "{{ states('input_number.hemma_thermostat_target_temperature') | float }}"
    - action: input_boolean.turn_off
      target:
        entity_id: "{{ toggle_helper }}"

# Start immediately: delay 0, programme from select
start_dishwasher_now:
  alias: "Start Dishwasher Now"
  sequence:
    - action: home_connect.set_program_and_options
      data:
        device_id: "{{ state_attr('sensor.hemma_entity_ids', 'dishwasher_device_id') }}"
        affects_to: active_program
        program: "{{ states(state_attr('sensor.hemma_entity_ids', 'dishwasher_selected_programme')) }}"
        b_s_h_common_option_start_in_relative: "0"

# Start now or at [time]: if delay-start toggle is on, use "Start at" time; otherwise delay 0.
start_dishwasher:
  alias: "Start Dishwasher"
  sequence:
    - variables:
        dishwasher_delay_start: "{{ state_attr('sensor.hemma_entity_ids', 'dishwasher_delay_start') }}"
        dishwasher_start_at: "{{ state_attr('sensor.hemma_entity_ids', 'dishwasher_start_at') }}"
        dishwasher_selected_programme: "{{ state_attr('sensor.hemma_entity_ids', 'dishwasher_selected_programme') }}"
    - action: home_connect.set_program_and_options
      data:
        device_id: "{{ state_attr('sensor.hemma_entity_ids', 'dishwasher_device_id') }}"
        affects_to: active_program
        program: "{{ states(dishwasher_selected_programme) }}"
        b_s_h_common_option_start_in_relative: >
          {% if states(dishwasher_delay_start) != 'on' %}
            0
          {% else %}
            {% set t_raw = states(dishwasher_start_at) %}
            {% set t = t_raw ~ ':00' if (t_raw.split(':') | length) == 2 else t_raw %}
            {% set tt = as_timestamp(strptime(t ~ ' ' ~ now().strftime('%Y-%m-%d'), '%H:%M:%S %Y-%m-%d')) %}
            {% set nt = as_timestamp(now()) %}
            {% set diff = (tt - nt) | int %}
            {% if diff > 60 %}
              {{ diff }}
            {% elif diff >= -120 %}
              0
            {% else %}
              {{ diff + 86400 }}
            {% endif %}
          {% endif %}

# Washer start (ThinQ): use washer option select API.
start_washing_machine:
  alias: "Start Washer"
  sequence:
    - action: select.select_option
      data:
        entity_id: "{{ state_attr('sensor.hemma_entity_ids', 'washer_operation') }}"
        option: start

# Washer delay-start (local HA scheduler):
# Arms delay mode; automation in packages/hemma_helpers.yaml executes script.start_washing_machine at input_datetime.hemma_washer_start_at.
start_washing_machine_with_delay:
  alias: "Start Washer With Delay"
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: "{{ state_attr('sensor.hemma_entity_ids', 'washer_delay_start') }}"
    - action: input_boolean.turn_off
      target:
        entity_id: "{{ state_attr('sensor.hemma_entity_ids', 'washer_delay_start_ui') }}"
