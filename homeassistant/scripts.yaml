# Scripts used by Hemma dashboard and other automations.
# Start uses home_connect.set_program_and_options with program + delay in one call (reference format).

# Activate a room scene and record the name in an input_text helper so the
# scene badge subtitle updates reactively (scene entities stay in 'scening'
# state and never fire state_changed on repeat calls; input_text does).
hemma_activate_room_scene:
  alias: "Hemma Activate Room Scene"
  fields:
    scene_id:
      description: "Scene entity ID to activate (e.g. scene.living_room_focus_scene)"
      selector:
        entity:
          domain: scene
    scene_name:
      description: "Short display name to store (e.g. Focus)"
    select_entity:
      description: "input_text entity to update (e.g. input_text.hemma_living_room_scene)"
      selector:
        entity:
          domain: input_text
  sequence:
    - action: scene.turn_on
      target:
        entity_id: "{{ scene_id }}"
    - action: input_text.set_value
      target:
        entity_id: "{{ select_entity }}"
      data:
        value: "{{ scene_name }}"

# Thermostat: sync target temp from climate entity and toggle overlay
hemma_thermostat_open_overlay:
  alias: "Hemma Thermostat Open Overlay"
  fields:
    climate_entity:
      description: "Climate entity to get target temperature from"
    toggle_helper:
      description: "Input boolean to toggle"
  sequence:
    - action: input_number.set_value
      target:
        entity_id: input_number.hemma_thermostat_target_temperature
      data:
        value: "{{ state_attr(climate_entity, 'temperature') | float(22) }}"
    - action: input_boolean.toggle
      target:
        entity_id: "{{ toggle_helper }}"

# Dehumidifier: −/+ call humidifier.set_humidity on the unit (30–80 %). Helper is updated for fast UI.
# Current target: device attribute if present, else synced input_number (e.g. unit offline).
hemma_dehumidifier_humidity_minus_1:
  alias: "Dehumidifier target −1 (device)"
  sequence:
    - variables:
        dehumidifier: "{{ state_attr('sensor.hemma_entity_ids', 'dehumidifier') }}"
        target_helper: "{{ state_attr('sensor.hemma_entity_ids', 'dehumidifier_target_humidity') }}"
        cur: "{{ (state_attr(dehumidifier, 'humidity') if state_attr(dehumidifier, 'humidity') is not none else states(target_helper)) | int(50) }}"
        new_h: "{{ [[cur - 1, 30] | max, 80] | min }}"
    - action: humidifier.set_humidity
      target:
        entity_id: "{{ dehumidifier }}"
      data:
        humidity: "{{ new_h }}"
    - action: input_number.set_value
      target:
        entity_id: "{{ target_helper }}"
      data:
        value: "{{ new_h }}"
