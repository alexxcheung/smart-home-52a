# Exposes includes/hemma_entity_ids.yaml as sensor.hemma_entity_ids attributes
# so automations and button-card JS can resolve semantic names at runtime.
#
# Attribute values must be quoted Jinja strings — plain entity IDs are
# interpreted as templates and fail silently (only friendly_name remains).
# Regenerate this block when includes/hemma_entity_ids.yaml changes.
template:
  - trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: event_template_reloaded
    sensor:
      - name: Hemma Entity IDs
        unique_id: hemma_entity_ids
        state: "{{ 'ok' }}"
        attributes:
          ring_live_view: "{{ 'camera.ring_live_view' }}"
          ring_battery: "{{ 'sensor.ring_battery' }}"
          ring_motion_event: "{{ 'event.ring_motion' }}"
          ring_ding_event: "{{ 'event.ring_ding' }}"
          ring_volume: "{{ 'number.ring_volume' }}"
          ring_last_activity: "{{ 'sensor.ring_last_activity' }}"
          ring_signal_strength: "{{ 'sensor.ring_signal_strength' }}"
          ring_wifi_signal_category: "{{ 'sensor.ring_wi_fi_signal_category' }}"
          door_chime_volume: "{{ 'number.door_chime_volume_2' }}"
          door_chime_siren: "{{ 'siren.door_chime_siren_2' }}"
          door_chime_signal_strength: "{{ 'sensor.door_chime_signal_strength' }}"
          door_chime_wifi_signal_category: "{{ 'sensor.door_chime_wi_fi_signal_category' }}"
          light_front_door: "{{ 'light.front_door' }}"
