# packages/hemma_helpers.yaml
# ============================================================================
# REQUIRED: Hemma Dashboard Helper Entities
#
# These helper entities are required for the Hemma dashboard to function.
# Place this file in your /config/packages/ directory and ensure packages
# are enabled in your configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# ENTITIES CREATED:
#   - input_boolean.hemma_thermostat_overlay: Thermostat card temperature adjustment overlay
#   - input_boolean.hemma_mobile_navigation: Mobile nav menu state
#   - input_number.hemma_thermostat_target_temperature: Thermostat target temp
#   - input_select.hemma_thermostat_mode: Heat/Cool mode selector
#   - input_select.hemma_weather_popup_forecast_tab: Weather Bubble Daily/Hourly tab
#   - sensor.hemma_weather_today_range: Today's forecast high/low for weather popup header
#
# OPTIONAL: Adjust min/max values for input_number to match your climate needs.
# ============================================================================

input_boolean:
  hemma_thermostat_overlay:
    name: Thermostat Overlay
    initial: off

  hemma_mobile_navigation:
    name: Mobile Navigation
    initial: off

  hemma_dishwasher_delay_start:
    name: Dishwasher Delay Start
    initial: off

  hemma_washer_delay_start:
    name: Washer Delay Start
    initial: off

  hemma_washer_delay_start_ui:
    name: Washer Delay Start UI
    initial: off

input_number:
  hemma_thermostat_target_temperature:
    name: Thermostat Target Temperature
    min: 16
    max: 28
    step: 0.5
    unit_of_measurement: "°C"
    mode: slider

  # Dishwasher delay (seconds). Set by script from start-at time; kept for compatibility.
  hemma_dishwasher_delay_seconds:
    name: Dishwasher Delay Start
    min: 0
    max: 86400
    step: 900
    unit_of_measurement: s
    mode: slider

  # Dehumidifier target humidity (mirrors device; scripts update this when using −/+)
  hemma_dehumidifier_target_humidity:
    name: Dehumidifier Target Humidity
    min: 30
    max: 80
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 50

# Time-of-day picker: "Start at 18:30". Script passes delay (seconds) in home_connect.set_program_and_options.
input_datetime:
  hemma_dishwasher_start_at:
    name: Dishwasher Start At
    has_date: false
    has_time: true
    icon: mdi:clock-outline

  hemma_washer_start_at:
    name: Washer Start At
    has_date: false
    has_time: true
    icon: mdi:clock-outline

input_select:
  hemma_thermostat_mode:
    name: Thermostat Mode
    options:
      - heat
      - cool
    initial: heat

# ============================================================================
# PRESENCE TRACKING WITH RICH STATES
# States: home, just_arrived, away, just_left, extended_away
# ============================================================================
input_select:
  presence_alex:
    name: "Alex"
    options:
      - home
      - just_arrived
      - away
      - just_left
      - extended_away
    initial: away
    icon: mdi:account

  presence_sammy:
    name: "Sammy"
    options:
      - home
      - just_arrived
      - away
      - just_left
      - extended_away
    initial: away
    icon: mdi:account

  hemma_security_state:
    name: Home Security State
    options:
      - Home
      - Vacation
      - Guest
      - Pet Home
      - Focus
      - Bypass
    initial: Home
    icon: mdi:shield-home

  hemma_weather_popup_forecast_tab:
    name: Weather popup forecast tab
    options:
      - Daily
      - Hourly
    initial: Daily
    icon: mdi:weather-partly-cloudy

input_text:
  hemma_living_room_scene:
    name: Living Room Active Scene
    initial: ""
    icon: mdi:palette

  hemma_kitchen_scene:
    name: Kitchen Active Scene
    initial: ""
    icon: mdi:palette

  hemma_hallway_scene:
    name: Hallway Active Scene
    initial: ""
    icon: mdi:palette

  hemma_bedroom_scene:
    name: Bedroom Active Scene
    initial: ""
    icon: mdi:palette

  hemma_study_scene:
    name: Study Active Scene
    initial: ""
    icon: mdi:palette

# Template sensors that mirror input_select with friendly_name attribute
template:
  - sensor:
      - name: "Alex"
        unique_id: hemma_presence_alex
        state: "{{ states('input_select.presence_alex') }}"
        attributes:
          source_entity: device_tracker.imalex_17

      - name: "Sammy"
        unique_id: hemma_presence_sammy
        state: "{{ states('input_select.presence_sammy') }}"
        attributes:
          source_entity: device_tracker.imsammy_iphone

  # Today's high/low from Pirate Weather / any weather entity (for Hemma popup header).
  - trigger:
      - platform: state
        entity_id: weather.forecast_home
      - platform: time_pattern
        hours: "/3"
      - platform: homeassistant
        event: start
    action:
      - action: weather.get_forecasts
        data:
          entity_id: weather.forecast_home
          type: daily
        response_variable: daily
    sensor:
      - name: Hemma weather today range
        unique_id: hemma_weather_today_range
        state: OK
        attributes:
          temp_high: >-
            {% if daily is defined and daily.get('weather.forecast_home', {}).forecast | default([]) | length > 0 %}
              {{ daily['weather.forecast_home'].forecast[0].temperature }}
            {% endif %}
          temp_low: >-
            {% if daily is defined and daily.get('weather.forecast_home', {}).forecast | default([]) | length > 0 %}
              {{ daily['weather.forecast_home'].forecast[0].templow }}
            {% endif %}

# Automations for presence state transitions
automation:
  # -------------------------
  # Washer Delay Start
  # -------------------------
  - id: hemma_washer_delay_start_run
    alias: "Washer - Run delayed start"
    trigger:
      - trigger: time
        at: input_datetime.hemma_washer_start_at
    condition:
      - condition: state
        entity_id: input_boolean.hemma_washer_delay_start
        state: "on"
    action:
      - action: script.start_washing_machine
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.hemma_washer_delay_start

  # -------------------------
  # Alex Presence Automations
  # -------------------------
  - id: hemma_presence_alex_arrived
    alias: "Alex - Arrived Home"
    trigger:
      - trigger: state
        entity_id: device_tracker.imalex_17
        to: "home"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_alex
        data:
          option: just_arrived

  - id: hemma_presence_alex_home
    alias: "Alex - Settled Home"
    trigger:
      - trigger: state
        entity_id: input_select.presence_alex
        to: "just_arrived"
        for:
          minutes: 10
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_alex
        data:
          option: home

  - id: hemma_presence_alex_left
    alias: "Alex - Left Home"
    trigger:
      - trigger: state
        entity_id: device_tracker.imalex_17
        to: "not_home"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_alex
        data:
          option: just_left

  - id: hemma_presence_alex_away
    alias: "Alex - Away"
    trigger:
      - trigger: state
        entity_id: input_select.presence_alex
        to: "just_left"
        for:
          minutes: 10
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_alex
        data:
          option: away

  - id: hemma_presence_alex_extended
    alias: "Alex - Extended Away"
    trigger:
      - trigger: state
        entity_id: input_select.presence_alex
        to: "away"
        for:
          hours: 24
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_alex
        data:
          option: extended_away

  # Set initial state on HA start
  - id: hemma_presence_alex_init
    alias: "Alex - Initialize on Start"
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_alex
        data:
          option: >
            {{ 'home' if states('device_tracker.imalex_17') == 'home' else 'away' }}

  # -------------------------
  # Sammy Presence Automations
  # -------------------------
  - id: hemma_presence_sammy_arrived
    alias: "Sammy - Arrived Home"
    trigger:
      - trigger: state
        entity_id: device_tracker.imsammy_iphone
        to: "home"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_sammy
        data:
          option: just_arrived

  - id: hemma_presence_sammy_home
    alias: "Sammy - Settled Home"
    trigger:
      - trigger: state
        entity_id: input_select.presence_sammy
        to: "just_arrived"
        for:
          minutes: 10
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_sammy
        data:
          option: home

  - id: hemma_presence_sammy_left
    alias: "Sammy - Left Home"
    trigger:
      - trigger: state
        entity_id: device_tracker.imsammy_iphone
        to: "not_home"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_sammy
        data:
          option: just_left

  - id: hemma_presence_sammy_away
    alias: "Sammy - Away"
    trigger:
      - trigger: state
        entity_id: input_select.presence_sammy
        to: "just_left"
        for:
          minutes: 10
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_sammy
        data:
          option: away

  - id: hemma_presence_sammy_extended
    alias: "Sammy - Extended Away"
    trigger:
      - trigger: state
        entity_id: input_select.presence_sammy
        to: "away"
        for:
          hours: 24
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_sammy
        data:
          option: extended_away

  # Set initial state on HA start
  - id: hemma_presence_sammy_init
    alias: "Sammy - Initialize on Start"
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.presence_sammy
        data:
          option: >
            {{ 'home' if states('device_tracker.imsammy_iphone') == 'home' else 'away' }}

  # ============================================================================
  # SECURITY STATE AUTOMATIONS
  # Triggered whenever input_select.hemma_security_state changes.
  # Each mode block has TODO comments — fill in your actual entity IDs.
  # ============================================================================
  - id: hemma_security_state_home
    alias: "Security - Home (Normal)"
    trigger:
      - trigger: state
        entity_id: input_select.hemma_security_state
        to: "Home"
    action:
      # TODO: Disarm alarm panel
      # - action: alarm_control_panel.alarm_disarm
      #   target: { entity_id: alarm_control_panel.YOUR_ALARM }
      #   data: { code: "YOUR_CODE" }

      # TODO: Cancel any temporary access (e.g. unlock timers)
      # TODO: Re-enable motion sensor notifications
      # TODO: Restore heating to normal schedule
      - action: logbook.log
        data:
          name: "Security State"
          message: "Switched to Home mode"
          entity_id: input_select.hemma_security_state

  - id: hemma_security_state_vacation
    alias: "Security - Vacation"
    trigger:
      - trigger: state
        entity_id: input_select.hemma_security_state
        to: "Vacation"
    action:
      # TODO: Arm alarm panel (away mode)
      # - action: alarm_control_panel.alarm_arm_away
      #   target: { entity_id: alarm_control_panel.YOUR_ALARM }
      #   data: { code: "YOUR_CODE" }

      # Frost protection — set all radiators to 12 °C
      # TODO: Replace entity IDs with your actual climate entities
      # - action: climate.set_temperature
      #   target:
      #     entity_id:
      #       - climate.radiator_thermostat_x_living_room
      #       - climate.radiator_thermostat_x_hallway
      #       - climate.radiator_thermostat_x_study_room
      #   data: { temperature: 12, hvac_mode: heat }

      # TODO: Turn off non-essential smart plugs
      # - action: switch.turn_off
      #   target: { entity_id: [ switch.YOUR_PLUG_1, switch.YOUR_PLUG_2 ] }

      # Presence simulation: random lights in Living Room + Bedroom in the evening
      # The script below runs independently; cancel it when leaving Vacation mode.
      - action: script.turn_on
        target: { entity_id: script.hemma_security_presence_simulation }
      - action: logbook.log
        data:
          name: "Security State"
          message: "Switched to Vacation mode — frost protection + presence simulation active"
          entity_id: input_select.hemma_security_state

  - id: hemma_security_state_vacation_end
    alias: "Security - Vacation ended (cancel simulation)"
    trigger:
      - trigger: state
        entity_id: input_select.hemma_security_state
        from: "Vacation"
    action:
      - action: script.turn_off
        target: { entity_id: script.hemma_security_presence_simulation }
      # Ensure simulation lights are off
      - action: light.turn_off
        target:
          entity_id:
            - light.sofa_light
            - light.floor_light
            - light.hue_lightstrip_plus_1

  - id: hemma_security_state_guest
    alias: "Security - Guest / Party"
    trigger:
      - trigger: state
        entity_id: input_select.hemma_security_state
        to: "Guest"
    action:
      # TODO: Disable internal motion sensor automations
      # - action: automation.turn_off
      #   target: { entity_id: automation.YOUR_MOTION_LIGHT_AUTOMATION }

      # TODO: Set front door lock to passage mode for 4 hours
      # - action: lock.unlock
      #   target: { entity_id: lock.YOUR_FRONT_DOOR }

      # TODO: Mute doorbell person-detected notifications
      # - action: notify.mobile_app_YOUR_PHONE
      #   data: { message: "command_dnd_priority_only" }  # Android
      - action: logbook.log
        data:
          name: "Security State"
          message: "Switched to Guest mode — motion automations paused"
          entity_id: input_select.hemma_security_state

  - id: hemma_security_state_pet_home
    alias: "Security - Pet Home"
    trigger:
      - trigger: state
        entity_id: input_select.hemma_security_state
        to: "Pet Home"
    action:
      # TODO: Arm perimeter sensors only (doors + windows), bypass PIR motion sensors
      # - action: alarm_control_panel.alarm_arm_home
      #   target: { entity_id: alarm_control_panel.YOUR_ALARM }
      #   data: { code: "YOUR_CODE" }

      # TODO: Ensure climate stays comfortable for pets (18–22 °C)
      # - action: climate.set_temperature
      #   target: { entity_id: climate.radiator_thermostat_x_living_room }
      #   data: { temperature: 20, hvac_mode: heat }
      - action: logbook.log
        data:
          name: "Security State"
          message: "Switched to Pet Home mode — perimeter armed, PIR bypassed"
          entity_id: input_select.hemma_security_state

  - id: hemma_security_state_focus
    alias: "Security - Focus / Home Office"
    trigger:
      - trigger: state
        entity_id: input_select.hemma_security_state
        to: "Focus"
    action:
      # TODO: Set doorbell to silent chime mode
      # - action: select.select_option
      #   target: { entity_id: select.YOUR_DOORBELL_CHIME }
      #   data: { option: "Silent" }

      # TODO: Flash Study lights once when doorbell rings (separate automation)
      # See automation id: hemma_security_focus_doorbell_flash

      # TODO: Mute non-critical mobile notifications
      - action: logbook.log
        data:
          name: "Security State"
          message: "Switched to Focus mode — Do Not Disturb active"
          entity_id: input_select.hemma_security_state

  - id: hemma_security_state_bypass
    alias: "Security - Bypass / Maintenance"
    trigger:
      - trigger: state
        entity_id: input_select.hemma_security_state
        to: "Bypass"
    action:
      # TODO: Disarm alarm
      # - action: alarm_control_panel.alarm_disarm
      #   target: { entity_id: alarm_control_panel.YOUR_ALARM }
      #   data: { code: "YOUR_CODE" }

      # TODO: Unlock back / side door
      # - action: lock.unlock
      #   target: { entity_id: lock.YOUR_BACK_DOOR }

      # Auto-revert to Home after 2 hours
      - delay: "02:00:00"
      - action: input_select.select_option
        target: { entity_id: input_select.hemma_security_state }
        data: { option: Home }
      - action: logbook.log
        data:
          name: "Security State"
          message: "Bypass window ended — reverted to Home mode"
          entity_id: input_select.hemma_security_state

  # Sync dehumidifier target humidity to input_number (device → UI and on start)
  - id: hemma_dehumidifier_sync_target
    alias: "Dehumidifier - Sync target humidity to helper"
    trigger:
      - trigger: state
        entity_id: humidifier.probreeze_dehumidifier
      - trigger: homeassistant
        event: start
    condition: "{{ state_attr('humidifier.probreeze_dehumidifier', 'humidity') is not none }}"
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.hemma_dehumidifier_target_humidity
        data:
          value: "{{ state_attr('humidifier.probreeze_dehumidifier', 'humidity') | int }}"

