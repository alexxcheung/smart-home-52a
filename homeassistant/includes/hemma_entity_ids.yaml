# Hemma semantic entity ID registry
# ============================================================================
# Single source of truth for entity IDs used across dashboards, automations,
# scripts, and packages. Update here when an integration is re-added or
# entities are renamed in Home Assistant.
#
# Usage:
#   Lovelace (button-card):
#     variables:
#       eids: !include /config/includes/hemma_entity_ids.yaml
#     entity: '[[[ return variables.eids.ring_live_view ]]]'
#
#   Automations / scripts (Jinja) — actions and conditions:
#     entity_id: "{{ state_attr('sensor.hemma_entity_ids', 'ring_live_view') }}"
#
#   Button-card JavaScript:
#     const EID = states['sensor.hemma_entity_ids']?.attributes ?? {};
#     states[EID.ring_battery]
#
#   State/event triggers cannot template entity_id — keep these in sync manually:
#     ring_motion_event              → packages/hemma_architectural_notifications.yaml
#                                      automations.yaml (Area - Entrance - Motion Detected Front Door)
#     dishwasher_operation_state     → packages/hemma_appliance_connect_monitor.yaml
#     washer_current_status          → packages/hemma_appliance_connect_monitor.yaml
#     dehumidifier                   → packages/hemma_appliance_connect_monitor.yaml
#                                      automations.yaml (dehumidifier automations)
#     device_tracker_alex            → packages/hemma_helpers.yaml (presence automations)
#     device_tracker_sammy           → packages/hemma_helpers.yaml (presence automations)
#     weather_home                   → packages/hemma_home_mode.yaml (climate sync trigger)
# ============================================================================

