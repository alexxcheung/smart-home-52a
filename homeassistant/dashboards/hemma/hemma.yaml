# /config/dashboards/hemma/hemma.yaml.example
# Hemma Dashboard - Example Configuration
# ============================================================================
# Copy or rename this file to hemma.yaml and customize the entity IDs to match
# your Home Assistant setup. Search for "YOUR_" to find all placeholders.
#
# REQUIRED: Replace all entity IDs with your own entities
# OPTIONAL: Adjust room names, add/remove rooms, customize features
# ============================================================================

button_card_templates: !include_dir_merge_named /config/dashboards/templates/button_cards

# Kiosk Mode (optional - requires kiosk-mode HACS integration)
# hide_header / hide_sidebar can be Jinja templates (subscribed by kiosk-mode).
# input_boolean.hemma_show_ha_chrome: ON = show chrome, OFF = hide (wall mode).
# Emergency: append ?disable_km to the URL to force kiosk off for that load.
kiosk_mode:
  hide_header: '{{ not is_state(''input_boolean.hemma_show_ha_chrome'', ''on'') }}'
  hide_sidebar: '{{ not is_state(''input_boolean.hemma_show_ha_chrome'', ''on'') }}'
  hide_dialog_light_settings_actions: true
  hide_dialog_logbook: true

  # No mobile_settings block: kiosk-mode merges mobile_settings when width ≤812px and it
  # would override hide_header/hide_sidebar. Omitting it lets phones use the same
  # hemma_show_ha_chrome templates as desktop (Hem menu toggles HA chrome).

  custom_settings:
    # EXCEPTION: show header/sidebar on MacBook web browsers
    - user_agent: "Macintosh; Intel Mac OS X|Macintosh; Apple M"
      hide_header: false
      hide_sidebar: false

views:
  # ------------------------------------------------------
  # HOME
  # ------------------------------------------------------
  # The main overview room - typically shows whole-home controls
  # and media player status across all rooms
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: home
    path: home
    layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
    card_mod: !include /config/dashboards/templates/includes/hemma_screen_view_card_mod.yaml
    cards:
      # NAV BAR (same as Info: desktop nav + menu + time below app header)
      - type: custom:button-card
        template: hemma_nav_shell
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Home
        variables:
          # Image Configuration
          # Place your images at: /config/www/hemma/rooms/home.jpg (light mode)
          #                       /config/www/hemma/rooms/home-night.jpg (dark mode)
          image: home
          image_position: center center

          # Temperature
          # show_temp: true
          # temp_sensor: weather.forecast_home.temperature

          # Presence Badges (optional - requires person/status sensors)
          # These show who's home on the hero card
          show_presence: true
          presence_entity_1: sensor.presence_alex
          presence_entity_2: sensor.presence_sammy

          # Media Player Badges (shows what's playing across rooms)
          show_media_badge: true
          pause_timeout_minutes: 5
          show_media_player_1: true
          media_player_1: media_player.samsung_qb90_qe65qn90batxxu
          show_media_player_2: true
          media_player_2: media_player.sonos_arc
          show_media_player_3: true
          media_player_3: media_player.homepod_living_room

          # Weather Widget
          show_weather: true
          weather_mode: outdoor                         
          weather_entity: weather.forecast_home
          weather_temp_sensor: state_attr('weather.forecast_home', 'temperature')

          # Temperature Unit (affects comfort labels like "Cool", "Warm", etc.)
          temp_unit: 'C'                                  # 'F' for Fahrenheit, 'C' for Celsius

          # Security State Badge
          show_security: true

      # MOBILE NAVBAR
      - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          - type: custom:button-card
            template: hemma_doorbell
            entity: camera.front_door_live_view 
            camera_view: live
            name: Front Door
            variables:
              icon: doorbell
              battery_entity: sensor.front_door_battery
          # Lights
          - type: custom:button-card
            template: hemma_light
            entity: light.xuan_guan
            name: Genkan light
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_light
            entity: light.front_door
            name: Door light
            variables:
              icon: light

      # Weather forecast Bubble (hash #hemma-weather-forecast)
      - !include /config/dashboards/templates/button_cards/cards/hemma_weather/hemma_weather_bubble_popup.yml

      # Security state Bubble (must be last on Home view; hash #hemma-security)
      - !include /config/dashboards/templates/button_cards/cards/hemma_security_bubble_popup.yml

  # ------------------------------------------------------
  # INFO
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: Info
    path: info
    layout: !include /config/dashboards/templates/hemma_info/hemma_info_layout.yaml
    card_mod: !include /config/dashboards/templates/hemma_info/hemma_info_view_card_mod.yaml
    cards:
      # NAV BAR - spans all columns with zero height so it doesn't consume a grid row
      - type: custom:button-card
        template: hemma_nav_shell
        variables:
          hemma_info_scroll_hide_menu: true
        view_layout:
          grid-column: 1 / -1
          height: 0
          overflow: visible
          min-height: 0
          padding: 0
          margin: 0
      # Page background — zero-height full-width row like nav so it does not steal column 1
      - type: custom:button-card
        template: hemma_info_page_background
        view_layout:
          grid-column: 1 / -1
          height: 0
          overflow: visible
          min-height: 0
          padding: 0
          margin: 0
        variables:
          image: info
          image_ext: jpg
          image_ext_night: png
          image_position: center center
      # Categories: Daily Pulse strip (shopping + 1 dummy) → Atmosphere titles → Energy strip (Octopus)
      - !include /config/dashboards/templates/hemma_info/hemma_info_body.yaml
      # MOBILE / TABLET NAVBAR - placed last so it doesn't consume an early grid cell
      - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml
      # System log Bubble (must be last on Info view; hash #hemma-system-log)
      - !include /config/dashboards/templates/button_cards/cards/hemma_system_log_bubble_popup.yml
      # Octopus Agile Bubble (hash #hemma-octopus-agile)
      - !include /config/dashboards/templates/button_cards/cards/hemma_octopus_agile_bubble_popup.yml
      # Lists Bubble (hash #hemma-lists) - opened from the shopping tile
      - !include /config/dashboards/templates/button_cards/cards/hemma_shopping_list_bubble_popup.yml
      # Engine batteries Bubble (hash #hemma-engine-batteries)
      - !include /config/dashboards/templates/button_cards/cards/hemma_engine_battery_bubble_popup.yml

  # ------------------------------------------------------
  # LIVING ROOM
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: living-room
    path: living-room
    layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
    card_mod: !include /config/dashboards/templates/includes/hemma_screen_view_card_mod.yaml
    cards:
      # NAV BAR (same as Info: desktop nav + menu + time below app header)
      - type: custom:button-card
        template: hemma_nav_shell
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Living Room
        variables:
          image: livingroom
          image_position: center center

          # Room Sensors (Using your Home Forecast for now)
          show_temp: true
          temp_sensor: sensor.radiator_thermostat_x_living_room_temperature

          show_humidity: true
          humidity_sensor: sensor.radiator_thermostat_x_living_room_humidity

          show_quality: false # Set to true if you add an Air Quality sensor later
          quality_sensor: sensor.none

          show_scene: true
          scene_room: living_room
          scene_room_label: Living Room

          # Weather
          show_weather: true
          weather_mode: room
          temp_unit: 'C'

      # MOBILE NAVBAR
      - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          # Radiator
          - type: custom:button-card
            template: hemma_thermostat
            entity: climate.radiator_thermostat_x_living_room
            name: Thermostat
            variables:
              temp_sensor: sensor.radiator_thermostat_x_living_room_temperature
              thermostat_toggle_helper: input_boolean.hemma_thermostat_overlay

          # Light
          - type: custom:button-card
            template: hemma_light  
            entity: light.sofa_light
            name: Floor Lamp
            variables:
              icon: lamp

          - type: custom:button-card
            template: hemma_light  
            entity: light.floor_light
            name: Floor Lightstrip
            variables:
              icon: light
          
          # Media
          - type: custom:button-card
            template: hemma_entity 
            entity: media_player.samsung_qb90_qe65qn90batxxu
            name: Samsung TV
            variables:
              icon: tv
            # This section ensures it turns 'Active' (blue/white) when the TV is on
            state:
              - operator: template
                value: |
                  [[[ return !["off", "standby", "unavailable"].includes(entity.state); ]]]
          
          - type: custom:button-card
            template: hemma_entity
            entity: media_player.sonos_arc
            name: Sonos Arc
            variables:
              icon: speaker
            tap_action:
              action: more-info # Tap the name/card for volume

      # Scene picker pop-up (must be last on this view; hash #hemma-scenes-living-room)
      - !include /config/dashboards/templates/button_cards/cards/hemma_scenes/hemma_scenes_living_room_bubble_popup.yml

  # ------------------------------------------------------
  # KITCHEN
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: kitchen
    path: kitchen
    layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
    card_mod: !include /config/dashboards/templates/includes/hemma_screen_view_card_mod.yaml
    cards:
      # NAV BAR (same as Info: desktop nav + menu + time below app header)
      - type: custom:button-card
        template: hemma_nav_shell
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Kitchen
        variables:
          image: kitchen
          image_position: center center

          show_scene: true
          scene_room: kitchen
          scene_room_label: Kitchen

      # MOBILE NAVBAR
      - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
        # Dishwasher
          - type: custom:button-card
            template: hemma_dishwasher
            entity: sensor.bosch_dishwasher_operation_state
            name: Dishwasher

      # Bubble Card pop-ups (must be last on this view)
      - !include /config/dashboards/templates/button_cards/cards/hemma_dishwasher/hemma_dishwasher_bubble_popup.yml
      - !include /config/dashboards/templates/button_cards/cards/hemma_scenes/hemma_scenes_kitchen_bubble_popup.yml

  # ------------------------------------------------------
  # HALLWAY
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: hallway
    path: hallway
    layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
    card_mod: !include /config/dashboards/templates/includes/hemma_screen_view_card_mod.yaml
    cards:
      # NAV BAR (same as Info: desktop nav + menu + time below app header)
      - type: custom:button-card
        template: hemma_nav_shell
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Hallway
        variables:
          image: hallway
          image_ext: png
          image_position: center center

          show_temp: true
          temp_sensor: sensor.radiator_thermostat_x_hallway_temperature

          show_humidity: true
          humidity_sensor: sensor.radiator_thermostat_x_hallway_humidity

          show_quality: false
          quality_sensor: sensor.YOUR_AIR_QUALITY

          show_scene: true
          scene_room: hallway
          scene_room_label: Hallway

          show_weather: true
          weather_mode: room
          temp_unit: 'C'

      # MOBILE NAVBAR
      - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
        # Radiator
          - type: custom:button-card
            template: hemma_thermostat
            entity: climate.radiator_thermostat_x_hallway
            name: Thermostat
            variables:
              temp_sensor: sensor.radiator_thermostat_x_hallway_temperature
              thermostat_toggle_helper: input_boolean.hemma_thermostat_overlay

        # Washing Machine
          - type: custom:button-card
            template: hemma_washer
            entity: sensor.washer_current_status
            name: Washing Machine
        
        # Dehumidifier
          - type: custom:button-card
            template: hemma_dehumidifier
            entity: humidifier.probreeze_dehumidifier
            name: Dehumidifier

      # Bubble Card pop-ups (must be last on this view)
      - !include /config/dashboards/templates/button_cards/cards/hemma_washer/hemma_washer_bubble_popup.yml
      - !include /config/dashboards/templates/button_cards/cards/hemma_dehumidifier/hemma_dehumidifier_bubble_popup.yml
      - !include /config/dashboards/templates/button_cards/cards/hemma_scenes/hemma_scenes_hallway_bubble_popup.yml

  # ------------------------------------------------------
  # BEDROOM
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: bedroom
    path: bedroom
    layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
    card_mod: !include /config/dashboards/templates/includes/hemma_screen_view_card_mod.yaml
    cards:
      # NAV BAR (same as Info: desktop nav + menu + time below app header)
      - type: custom:button-card
        template: hemma_nav_shell
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Bedroom
        variables:
          image: bedroom
          image_position: center center

          show_temp: true
          temp_sensor: sensor.radiator_thermostat_x_living_room_temperature

          show_humidity: true
          humidity_sensor: sensor.adiator_thermostat_x_living_room_humidity

          show_quality: true
          quality_sensor: sensor.YOUR_BEDROOM_AIR_QUALITY

          show_scene: true
          scene_room: bedroom
          scene_room_label: Bedroom

          show_weather: true
          weather_mode: room
          temp_unit: 'C'

          # Motion Sensor (optional)
          show_motion: true
          # motion_sensor: binary_sensor.YOUR_MOTION_SENSOR

      # MOBILE NAVBAR
      - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          # Light
          - type: custom:button-card
            template: hemma_light  
            entity: light.hue_lightstrip_plus_1
            name: Floor lightstrip
            variables:
              icon: light

      # Scene picker pop-up (must be last on this view; hash #hemma-scenes-bedroom)
      - !include /config/dashboards/templates/button_cards/cards/hemma_scenes/hemma_scenes_bedroom_bubble_popup.yml

  # ------------------------------------------------------
  # Study
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: study
    path: study
    layout: !include /config/dashboards/templates/includes/hemma_screen_layout.yaml
    card_mod: !include /config/dashboards/templates/includes/hemma_screen_view_card_mod.yaml
    cards:
      # NAV BAR (same as Info: desktop nav + menu + time below app header)
      - type: custom:button-card
        template: hemma_nav_shell
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Study
        variables:
          image: studyroom
          image_ext: png
          image_position: center center

          show_temp: true
          temp_sensor: sensor.radiator_thermostat_x_study_temperature

          show_humidity: true
          humidity_sensor: sensor.radiator_thermostat_x_study_humidity

          show_quality: false
          quality_sensor: sensor.YOUR_BEDROOM_AIR_QUALITY

          show_scene: true
          scene_room: study
          scene_room_label: Study

          show_weather: true
          weather_mode: room
          temp_unit: 'C'

          # Motion Sensor (optional)
          show_motion: true
          # motion_sensor: binary_sensor.YOUR_MOTION_SENSOR

      # MOBILE NAVBAR
      - !include /config/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          # Radiator
          - type: custom:button-card
            template: hemma_thermostat
            entity: climate.radiator_thermostat_x_study_room
            name: Thermostat
            variables:
              temp_sensor: sensor.radiator_thermostat_x_study_temperature
              thermostat_toggle_helper: input_boolean.hemma_thermostat_overlay

          # Light
          - type: custom:button-card
            template: hemma_light  
            entity: light.alex_desk_light
            name: Alex Desk
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_light  
            entity: light.sammy_desk_light
            name: Sammy Desk
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_light  
            entity: light.study_floor_light
            name: Floor Light
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_light
            entity: switch.zbminil2_study_downlight
            name: Downlight
            variables:
              icon: light
            state_display: >
              [[[
                const s = (entity?.state || '').toLowerCase();
                return s === 'on' ? 'On' : 'Off';
              ]]]

          # Printer
          - type: custom:button-card
            template: hemma_printer
            entity: sensor.hp_officejet_pro_9720e_series
            name: Printer

      # Scene picker pop-up (must be last on this view; hash #hemma-scenes-study)
      - !include /config/dashboards/templates/button_cards/cards/hemma_scenes/hemma_scenes_study_bubble_popup.yml

  # ------------------------------------------------------
  # Dehumidifier — full controls (native view; tap tile on Home to open)
  # No browser_mod: cards get normal HA entity subscriptions here.
  # ------------------------------------------------------
  - title: Dehumidifier
    path: dehumidifier
    subview: true
    type: masonry
    cards:
      - type: vertical-stack
        cards: !include /config/dashboards/templates/button_cards/cards/hemma_dehumidifier/hemma_dehumidifier_panel_cards.yaml

