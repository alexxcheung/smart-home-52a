hemma_scene_picker:
  # -------------------------------------------------------------------------
  # Scene picker — extends hemma_entity so it fits the entity-grid correctly.
  # Bind any always-available entity (e.g. input_boolean.hemma_mobile_navigation)
  # to satisfy the template; name/state are fully overridden here.
  #
  # Variables (set per card in hemma.yaml):
  #   room:       snake_case room id  e.g. "living_room"  (required)
  #   room_label: display name        e.g. "Living Room"  (required)
  # -------------------------------------------------------------------------
  template:
    - hemma_entity

  variables:
    room: null
    room_label: Room
    icon: scenes

  name: Scenes

  show_state: true
  state_display: Tap to set

  # Never show "active" highlight — the bound helper entity is irrelevant
  state:
    - operator: default
      styles:
        card:
          - background: var(--ha-card-background)

  tap_action:
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        title: "[[[ return variables.room_label + ' — Scenes' ]]]"
        style: |
          --popup-max-width: 380px;
          ha-dialog { --mdc-dialog-max-width: 380px !important; }
          .mdc-dialog .mdc-dialog__surface { max-width: 380px !important; }
        content: >
          [[[
            const room = variables.room;
            const defs = [
              {
                scene: `scene.${room}_focus`,
                name: 'Focus',
                label: 'Bright · 6000K',
                icon: 'mdi:white-balance-sunny',
                color: '#93c5fd',
                bg: 'rgba(147,197,253,0.10)'
              },
              {
                scene: `scene.${room}_relax`,
                name: 'Relax',
                label: 'Dim · 2200K',
                icon: 'mdi:candle',
                color: '#fbbf24',
                bg: 'rgba(251,191,36,0.10)'
              },
              {
                scene: `scene.${room}_night`,
                name: 'Night',
                label: 'Ultra-low · 2000K',
                icon: 'mdi:weather-night',
                color: '#f87171',
                bg: 'rgba(248,113,113,0.10)'
              },
              {
                scene: `scene.${room}_away`,
                name: 'Away',
                label: 'All off',
                icon: 'mdi:home-export-outline',
                color: '#94a3b8',
                bg: 'rgba(148,163,184,0.10)'
              }
            ];
            return {
              type: 'grid',
              columns: 2,
              square: false,
              cards: defs.map(d => ({
                type: 'custom:button-card',
                name: d.name,
                label: d.label,
                show_label: true,
                show_icon: true,
                icon: d.icon,
                styles: {
                  card: [
                    { background: d.bg },
                    { 'backdrop-filter': 'blur(20px)' },
                    { 'border-radius': '20px' },
                    { border: '1px solid rgba(255,255,255,0.12)' },
                    { 'box-shadow': 'none' },
                    { cursor: 'pointer' },
                    { padding: '20px 12px' },
                    { 'touch-action': 'manipulation' },
                    { 'min-height': '110px' }
                  ],
                  icon: [
                    { color: d.color },
                    { width: '32px' },
                    { height: '32px' }
                  ],
                  name: [
                    { 'font-size': '14px' },
                    { 'font-weight': '700' },
                    { 'margin-top': '12px' },
                    { color: 'var(--primary-text-color)' }
                  ],
                  label: [
                    { 'font-size': '11px' },
                    { opacity: '0.5' },
                    { 'margin-top': '4px' },
                    { color: 'var(--primary-text-color)' }
                  ],
                  grid: [
                    { 'grid-template-rows': 'auto auto auto' },
                    { 'grid-template-columns': '1fr' },
                    { 'justify-items': 'center' },
                    { 'text-align': 'center' }
                  ]
                },
                tap_action: {
                  action: 'call-service',
                  service: 'scene.turn_on',
                  service_data: { entity_id: d.scene }
                }
              }))
            };
          ]]]
