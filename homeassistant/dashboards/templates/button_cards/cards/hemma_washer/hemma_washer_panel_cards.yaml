# hemma_washer/hemma_washer_panel_cards.yaml — Bubble pop-up body for washer.
- type: vertical-stack
  cards:

    # ── Status header ──────────────────────────────────────────────
    - type: custom:button-card
      template: hemma_plain_button_card
      entity: sensor.washer_current_status
      tap_action: { action: none }
      styles: { card: [ { background: transparent }, { box-shadow: none }, { border: none } ] }
      custom_fields:
        content: >
          [[[
            const status = entity.state ?? 'unknown';
            const remaining = states['sensor.washer_remaining_time']?.state;
            const total = parseFloat(states['sensor.washer_total_time']?.state ?? 0);
            const remoteStart = states['binary_sensor.washer_remote_start']?.state === 'on';
            
            const labels = {
              power_off: 'Off', sleep: 'Sleep', initial: 'Ready', reserved: 'Scheduled',
              running: 'Running', spinning: 'Spinning', rinsing: 'Rinsing', drying: 'Drying',
              detecting: 'Detecting', cool_down: 'Cooling Down', pause: 'Paused',
              rinse_hold: 'Rinse Hold', end: 'Done', refreshing: 'Refreshing', error: 'Error'
            };
            
            const colors = {
              running: '#6bcb77', spinning: '#6bcb77', rinsing: '#6bcb77', drying: '#6bcb77',
              detecting: '#6bcb77', cool_down: '#6bcb77', end: '#6bcb77',
              error: '#ff6b6b', pause: '#ffd166', rinse_hold: '#ffd166', reserved: '#ffd166'
            };
            
            const bgColors = {
              running: 'rgba(107,203,119,0.08)', spinning: 'rgba(107,203,119,0.08)',
              rinsing: 'rgba(107,203,119,0.08)', drying: 'rgba(107,203,119,0.08)',
              detecting: 'rgba(107,203,119,0.08)', cool_down: 'rgba(107,203,119,0.08)',
              end: 'rgba(107,203,119,0.06)', error: 'rgba(255,107,107,0.08)',
              pause: 'rgba(255,209,102,0.07)', rinse_hold: 'rgba(255,209,102,0.07)',
              reserved: 'rgba(255,209,102,0.07)', initial: 'rgba(255,255,255,0.05)',
              power_off: 'rgba(255,255,255,0.05)', sleep: 'rgba(255,255,255,0.05)'
            };
            
            const color = colors[status] ?? 'var(--primary-text-color)';
            const bg = bgColors[status] ?? 'transparent';
            
            let progress = 0;
            let remStr = '';
            const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down'];
            
            if (runningStates.includes(status) && remaining && remaining !== 'unavailable') {
              const rem = Math.ceil((new Date(remaining) - new Date()) / 60000);
              if (rem > 0) {
                remStr = `${rem} min remaining`;
                if (total > 0) {
                  progress = Math.round(((total - rem) / total) * 100);
                }
              }
            }
            
            return `
              <div class="washer-header">
                <div class="status-row">
                  <span class="status-label" style="color:${color};background:${bg}">${labels[status] ?? status}</span>
                  ${!remoteStart && status !== 'power_off' ? '<span class="warn-badge">Remote Start Disabled</span>' : ''}
                </div>
                ${progress > 0 ? `
                  <div class="prog-wrap">
                    <div class="prog-bar">
                      <div class="prog-fill" style="width:${progress}%;background:${color}"></div>
                    </div>
                    <span class="prog-info">${progress}%${remStr ? ' · ' + remStr : ''}</span>
                  </div>
                ` : ''}
              </div>
            `;
          ]]]
      extra_styles: |
        .washer-header { padding: 16px 0 12px; border-radius: 12px; box-sizing: border-box; max-width: 100%; transition: background 0.3s ease; }
        .status-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
        .status-label { font-size: 11px; font-weight: 700; letter-spacing: 0.03em; padding: 8px; border-radius: 8px; display: inline-block; }
        /* Progress only: 24px below status row; horizontal padding to line up with Stop chip (Stop card unchanged) */
        .prog-wrap { width: 100%; max-width: 100%; padding: 24px 4px 0; margin-bottom: 2px; box-sizing: border-box; }
        .prog-bar { width: 100%; max-width: 100%; height: 8px; box-sizing: border-box; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
        .prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
        .prog-info { font-size: 11px; font-weight: 600; color: #ffffff; }
        .warn-badge { font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 8px; background: rgba(244,162,97,0.18); color: #f4a261; letter-spacing: 0.03em; display: inline-block; }

    # ── Message: Power off - need to enable Remote Start at machine ──
    - type: custom:button-card
      entity: sensor.washer_current_status
      triggers_update:
        - sensor.washer_current_status
      template: hemma_plain_button_card
      show_name: false
      show_icon: false
      tap_action:
        action: none
      custom_fields:
        instructions: |
          [[[
            return `
              <div style="text-align: center; padding: 8px 0;">
                <div style="font-size: 13px; font-weight: 600; color: var(--secondary-text-color); opacity: 0.8; margin-bottom: 8px;">
                  To enable remote control:
                </div>
                <div style="font-size: 12px; color: var(--secondary-text-color); opacity: 0.6; line-height: 1.6;">
                  1. Press Power on the machine<br>
                  2. Hold Remote Start for 3 sec<br>
                  3. Wait for door to lock
                </div>
              </div>
            `;
          ]]]
      state:
        - value: "power_off"
          styles:
            card:
              - display: flex !important
        - operator: default
          styles:
            card:
              - display: none !important
      styles:
        card:
          - border-radius: 12px
          - box-shadow: none
          - margin: 24px 0 16px
          - height: auto
          - padding: 12px
          - background: rgba(255,255,255,0.05)
          - border: 1px dashed rgba(255,255,255,0.2)

    # ── Remote Start status indicator (when powered on but remote start not enabled) ──
    - type: custom:button-card
      entity: binary_sensor.washer_remote_start
      triggers_update:
        - binary_sensor.washer_remote_start
        - sensor.washer_current_status
      template: hemma_plain_button_card
      show_name: false
      show_icon: false
      tap_action:
        action: none
      custom_fields:
        instructions: |
          [[[
            return `
              <div style="text-align: center; padding: 8px 0;">
                <div style="font-size: 13px; font-weight: 600; color: #f4a261; margin-bottom: 8px;">
                  ⚠ Remote Start not enabled
                </div>
                <div style="font-size: 12px; color: var(--secondary-text-color); opacity: 0.6; line-height: 1.6;">
                  Hold Remote Start button on machine for 3 sec
                </div>
              </div>
            `;
          ]]]
      state:
        - operator: template
          value: |
            [[[
              const status = states['sensor.washer_current_status']?.state;
              const remoteStart = entity.state;
              return status !== 'power_off' && status !== 'sleep' && remoteStart === 'off';
            ]]]
          styles:
            card:
              - display: flex !important
        - operator: default
          styles:
            card:
              - display: none !important
      styles:
        card:
          - border-radius: 12px
          - box-shadow: none
          - margin: 24px 0 16px
          - height: auto
          - padding: 12px
          - background: rgba(244,162,97,0.1)
          - border: 1px solid rgba(244,162,97,0.3)

    # ── Remote Start enabled indicator ──
    - type: custom:button-card
      entity: binary_sensor.washer_remote_start
      triggers_update:
        - binary_sensor.washer_remote_start
        - sensor.washer_current_status
      template: hemma_plain_button_card
      show_name: true
      show_icon: true
      icon: mdi:check-circle
      name: Remote Start Enabled
      tap_action:
        action: none
      state:
        - operator: template
          value: |
            [[[
              const status = states['sensor.washer_current_status']?.state;
              const remoteStart = entity.state;
              const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'pause'];
              return remoteStart === 'on' && !runningStates.includes(status);
            ]]]
          styles:
            card:
              - display: flex !important
        - operator: default
          styles:
            card:
              - display: none !important
      styles:
        card:
          - border-radius: 12px
          - box-shadow: none
          - margin: 24px 0 0
          - height: 48px
          - background: rgba(107,203,119,0.1)
          - border: 1px solid rgba(107,203,119,0.3)
        grid:
          - justify-content: center
        name:
          - font-size: 14px
          - font-weight: 600
          - text-align: center
          - color: "#6bcb77"
        icon:
          - color: "#6bcb77"
          - width: 20px
          - height: 20px

    # ── Power: Turn Off (shown when on and not running) ───────────────────────────
    - type: custom:button-card
      entity: sensor.washer_current_status
      triggers_update:
        - sensor.washer_current_status
      template: hemma_plain_button_card
      show_name: true
      show_icon: true
      icon: mdi:power
      show_state: false
      layout: icon_name_state
      name: Turn Off
      tap_action:
        action: call-service
        service: select.select_option
        service_data:
          entity_id: select.washer_operation
          option: power_off
      hold_action:
        action: none
      state:
        - operator: template
          value: >
            [[[
              const status = entity.state;
              const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down', 'pause'];
              return ['power_off', 'sleep'].includes(status) || runningStates.includes(status);
            ]]]
          styles:
            card:
              - display: none !important
      styles:
        card:
          - border-radius: 12px
          - box-shadow: none
          - margin: 12px 0 16px
          - height: 48px
          - background: rgba(255,107,107,0.14)
        grid:
          - justify-content: center
        name:
          - font-size: 14px
          - font-weight: 700
          - text-align: center
          - color: "#ff6b6b"
        icon:
          - color: "#ff6b6b"
          - width: 20px
          - height: 20px


    # ── Controls: delay + start when idle/ready; during wash only Stop ───────────
    - type: vertical-stack
      cards:
        # ── Delay Start (hidden while a cycle is active — only Stop is shown then)
        - type: conditional
          conditions:
            - entity: sensor.washer_current_status
              state_not: running
            - entity: sensor.washer_current_status
              state_not: spinning
            - entity: sensor.washer_current_status
              state_not: rinsing
            - entity: sensor.washer_current_status
              state_not: drying
            - entity: sensor.washer_current_status
              state_not: detecting
            - entity: sensor.washer_current_status
              state_not: cool_down
            - entity: sensor.washer_current_status
              state_not: pause
          card:
            type: vertical-stack
            card_mod:
              style: |
                ha-card .content {
                  display: flex !important;
                  flex-direction: column !important;
                  gap: 0 !important;
                }
            cards:
              - type: custom:button-card
                entity: sensor.washer_current_status
                name: Delay Start
                show_icon: false
                show_state: false
                tap_action:
                  action: none
                styles:
                  card:
                    - background: transparent
                    - box-shadow: none
                    # 16px space below title before delay button (matches dishwasher spacing intent)
                    - padding: 24px 0 16px
                    - height: auto
                    - justify-content: flex-start
                  name:
                    - font-size: 11px
                    - font-weight: 700
                    - text-transform: uppercase
                    - letter-spacing: 0.08em
                    - color: "#ffffff"
                    - opacity: "0.8"
                    - text-align: left

              - type: custom:button-card
                entity: input_boolean.hemma_washer_delay_start
                triggers_update:
                  - input_boolean.hemma_washer_delay_start
                template: hemma_plain_button_card
                show_name: true
                show_icon: true
                icon: mdi:clock-start
                show_state: false
                layout: icon_name_state
                name: >
                  [[[
                    return entity?.state === 'on' ? "'Delay Start' Enabled" : "Enable 'Delay Start'";
                  ]]]
                tap_action:
                  action: toggle
                hold_action:
                  action: none
                double_tap_action:
                  action: none
                state:
                  - value: "on"
                    styles:
                      card:
                        - background: "rgba(107,203,119,0.14) !important"
                        - border: "1px solid rgba(107,203,119,0.28) !important"
                      name:
                        - color: "#6bcb77 !important"
                      icon:
                        - color: "#6bcb77 !important"
                styles:
                  card:
                    - border-radius: 12px
                    - box-shadow: none
                    - margin: 0
                    - height: 48px
                    - background: rgba(255,255,255,0.08)
                    - border: 1px solid rgba(255,255,255,0.20)
                  grid:
                    - justify-content: center
                  name:
                    - font-size: 14px
                    - font-weight: 700
                    - text-align: center
                    - color: "#cfd6dd"
                  icon:
                    - color: "#cfd6dd"
                    - width: 20px
                    - height: 20px

              - type: conditional
                conditions:
                  - entity: input_boolean.hemma_washer_delay_start
                    state: "on"
                card:
                  type: custom:button-card
                  entity: input_datetime.hemma_washer_start_at
                  triggers_update:
                    - input_datetime.hemma_washer_start_at
                  template: hemma_plain_button_card
                  show_name: true
                  show_icon: true
                  icon: mdi:clock-outline
                  show_state: true
                  layout: icon_name_state
                  name: Start at
                  tap_action:
                    action: more-info
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  styles:
                    card:
                      - border-radius: 12px
                      - box-shadow: none
                      - margin: 0 0 16px
                      - height: 48px
                      - background: rgba(255,255,255,0.08)
                      - border: 1px solid rgba(255,255,255,0.20)
                    grid:
                      - justify-content: center
                    name:
                      - font-size: 14px
                      - font-weight: 700
                      - text-align: center
                      - color: "#cfd6dd"
                    state:
                      - font-size: 13px
                      - text-align: center
                      - color: "#cfd6dd"
                    icon:
                      - color: "#cfd6dd"
                      - width: 20px
                      - height: 20px

        # ── Start button: green chip when binary_sensor.washer_remote_start is on (Start Now / Start with Delay).
        #    Neutral dimmed chip = remote start off or unavailable — use the machine’s Remote Start, not “disabled” by delay.
        - type: conditional
          conditions:
            - entity: sensor.washer_current_status
              state_not: running
            - entity: sensor.washer_current_status
              state_not: spinning
            - entity: sensor.washer_current_status
              state_not: rinsing
            - entity: sensor.washer_current_status
              state_not: drying
            - entity: sensor.washer_current_status
              state_not: detecting
            - entity: sensor.washer_current_status
              state_not: cool_down
            - entity: sensor.washer_current_status
              state_not: pause
          card:
            type: custom:button-card
            entity: binary_sensor.washer_remote_start
            triggers_update:
              - binary_sensor.washer_remote_start
              - sensor.washer_current_status
              - input_boolean.hemma_washer_delay_start
            template: hemma_plain_button_card
            color: "#6bcb77"
            show_name: true
            show_icon: true
            icon: mdi:play
            show_state: false
            layout: icon_name_state
            name: |
              [[[
                const delayOn = states['input_boolean.hemma_washer_delay_start']?.state === 'on';
                return delayOn ? 'Start with Delay' : 'Start Now';
              ]]]
            tap_action:
              action: call-service
              service: script.start_washer
            hold_action:
              action: none
            double_tap_action:
              action: none
            state:
              # Must use explicit entity.state === 'on' (not operator: default after template) — some button-card
              # versions skip default and you only see base/theme styling (looks white).
              - operator: template
                value: "[[[ return entity?.state === 'on'; ]]]"
                styles:
                  card:
                    - border-radius: 12px
                    - box-shadow: none
                    - margin: 24px 0 16px
                    - height: 48px
                    - background: "rgba(107,203,119,0.14) !important"
                    - border: "1px solid rgba(107,203,119,0.28) !important"
                  grid:
                    - justify-content: center
                  name:
                    - font-size: 14px
                    - font-weight: 700
                    - text-align: center
                    - color: "#6bcb77 !important"
                  label:
                    - color: "#6bcb77 !important"
                  icon:
                    - color: "#6bcb77 !important"
                    - width: 20px
                    - height: 20px
              # Remote start off, unavailable, unknown — not tappable
              - operator: default
                styles:
                  card:
                    - border-radius: 12px
                    - box-shadow: none
                    - margin: 24px 0 16px
                    - height: 48px
                    - background: rgba(255,255,255,0.08)
                    - border: 1px solid rgba(255,255,255,0.20)
                    - opacity: 0.5
                    - pointer-events: none
                  grid:
                    - justify-content: center
                  name:
                    - font-size: 14px
                    - font-weight: 700
                    - text-align: center
                    - color: "var(--secondary-text-color) !important"
                  icon:
                    - color: "var(--secondary-text-color) !important"
                    - width: 20px
                    - height: 20px
            styles:
              card:
                - border-radius: 12px
                - box-shadow: none
                - margin: 24px 0 16px
                - height: 48px
                - background: rgba(107,203,119,0.14)
                - border: 1px solid rgba(107,203,119,0.28)
              grid:
                - justify-content: center
              name:
                - font-size: 14px
                - font-weight: 700
                - text-align: center
                - color: "#6bcb77 !important"
              label:
                - color: "#6bcb77 !important"
              icon:
                - color: "#6bcb77 !important"
                - width: 20px
                - height: 20px
            card_mod:
              style: |
                ha-card {
                  --primary-text-color: #6bcb77 !important;
                }

        # ── Stop button (when running) ──────────────────────────
        - type: conditional
          conditions:
            - entity: sensor.washer_current_status
              state_not: power_off
            - entity: sensor.washer_current_status
              state_not: sleep
            - entity: sensor.washer_current_status
              state_not: initial
            - entity: sensor.washer_current_status
              state_not: end
          card:
            type: custom:button-card
            entity: sensor.washer_current_status
            triggers_update:
              - sensor.washer_current_status
            template: hemma_plain_button_card
            show_name: true
            show_icon: true
            icon: mdi:stop
            show_state: false
            layout: icon_name_state
            name: Stop
            tap_action:
              action: call-service
              service: select.select_option
              service_data:
                entity_id: select.washer_operation
                option: stop
            styles:
              card:
                - border-radius: 12px
                - box-shadow: none
                - margin: 0
                - padding-bottom: 0
                - height: 48px
                - background: rgba(255,107,107,0.14)
              grid:
                - justify-content: center
              name:
                - font-size: 14px
                - font-weight: 700
                - text-align: center
                - color: "#ff6b6b"
              icon:
                - color: "#ff6b6b"
                - width: 20px
                - height: 20px
