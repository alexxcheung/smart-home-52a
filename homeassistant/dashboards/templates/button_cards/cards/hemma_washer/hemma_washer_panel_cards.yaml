# hemma_washer/hemma_washer_panel_cards.yaml — Bubble pop-up body for washer (status only).
- type: vertical-stack
  cards:

    # ── Status header ──────────────────────────────────────────────
    - type: custom:button-card
      template: hemma_plain_button_card
      entity: sensor.washer_current_status
      triggers_update:
        - sensor.washer_current_status
        - sensor.washer_remaining_time
        - sensor.washer_total_time
        # sensor.time (time_date) updates every minute so progress and
        # "X min remaining" stay fresh while the popup is open.
        - sensor.time
      tap_action: { action: none }
      styles: { card: [ { background: transparent }, { box-shadow: none }, { border: none } ] }
      custom_fields:
        content: >
          [[[
            const status = entity.state ?? 'unknown';
            const remaining = states['sensor.washer_remaining_time']?.state;
            const total = parseFloat(states['sensor.washer_total_time']?.state ?? 0);

            const labels = {
              power_off: 'Off', sleep: 'Sleep', initial: 'Ready', reserved: 'Scheduled',
              running: 'Running', spinning: 'Spinning', rinsing: 'Rinsing', drying: 'Drying',
              detecting: 'Detecting', cool_down: 'Cooling Down', pause: 'Paused',
              rinse_hold: 'Rinse Hold', end: 'Done', refreshing: 'Refreshing', error: 'Error'
            };

            const colors = {
              running: '#6bcb77', spinning: '#6bcb77', rinsing: '#6bcb77', drying: '#6bcb77',
              detecting: '#6bcb77', cool_down: '#6bcb77', end: '#6bcb77',
              error: '#ff6b6b', pause: '#ffd166', rinse_hold: '#ffd166', reserved: '#ffd166'
            };

            const bgColors = {
              running: 'rgba(107,203,119,0.08)', spinning: 'rgba(107,203,119,0.08)',
              rinsing: 'rgba(107,203,119,0.08)', drying: 'rgba(107,203,119,0.08)',
              detecting: 'rgba(107,203,119,0.08)', cool_down: 'rgba(107,203,119,0.08)',
              end: 'rgba(107,203,119,0.06)', error: 'rgba(255,107,107,0.08)',
              pause: 'rgba(255,209,102,0.07)', rinse_hold: 'rgba(255,209,102,0.07)',
              reserved: 'rgba(255,209,102,0.07)', initial: 'rgba(255,255,255,0.05)',
              power_off: 'rgba(255,255,255,0.05)', sleep: 'rgba(255,255,255,0.05)'
            };

            const color = colors[status] ?? 'var(--primary-text-color)';
            const bg = bgColors[status] ?? 'transparent';

            let progress = 0;
            let remStr = '';
            const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down'];

            if (runningStates.includes(status) && remaining && remaining !== 'unavailable' && remaining !== 'unknown') {
              const rem = Math.ceil((new Date(remaining) - new Date()) / 60000);
              if (rem > 0) {
                remStr = `${rem} min remaining`;
                if (total > 0) {
                  progress = Math.round(((total - rem) / total) * 100);
                }
              }
            }

            return `
              <div class="washer-header">
                <div class="status-row">
                  <span class="status-label" style="color:${color};background:${bg}">${labels[status] ?? status}</span>
                </div>
                ${progress > 0 ? `
                  <div class="prog-wrap">
                    <div class="prog-bar">
                      <div class="prog-fill" style="width:${progress}%;background:${color}"></div>
                    </div>
                    <span class="prog-info">${progress}%${remStr ? ' · ' + remStr : ''}</span>
                  </div>
                ` : (remStr ? `<div class="prog-wrap"><span class="prog-info">${remStr}</span></div>` : '')}
              </div>
            `;
          ]]]
      extra_styles: |
        .washer-header { padding: 16px 0 12px; border-radius: 12px; box-sizing: border-box; max-width: 100%; transition: background 0.3s ease; }
        .status-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
        .status-label { font-size: 11px; font-weight: 700; letter-spacing: 0.03em; padding: 8px; border-radius: 8px; display: inline-block; }
        .prog-wrap { width: 100%; max-width: 100%; padding: 24px 4px 0; margin-bottom: 2px; box-sizing: border-box; }
        .prog-bar { width: 100%; max-width: 100%; height: 8px; box-sizing: border-box; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
        .prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
        .prog-info { font-size: 11px; font-weight: 600; color: #ffffff; }

    # ── Error status (informational) ──
    - type: custom:button-card
      entity: sensor.washer_current_status
      triggers_update:
        - sensor.washer_current_status
      template: hemma_plain_button_card
      show_name: false
      show_icon: false
      tap_action:
        action: none
      custom_fields:
        instructions: |
          [[[
            return `
              <div style="text-align: center; padding: 0 0 8px; width: 100%; max-width: 100%;">
                <div style="font-size: 15px; font-weight: 600; color: #ff6b6b; margin-bottom: 8px; white-space: normal; overflow-wrap: anywhere; word-break: break-word; line-height: 1.35;">
                  Error Detected
                </div>
                <div style="font-size: 14px; color: var(--secondary-text-color); opacity: 0.75; line-height: 1.6; white-space: normal; overflow-wrap: anywhere; word-break: break-word;">
                  Check the machine panel for the error code.
                </div>
              </div>
            `;
          ]]]
      state:
        - value: "error"
          styles:
            card:
              - display: flex !important
        - operator: default
          styles:
            card:
              - display: none !important
              - height: 0 !important
              - margin: 0 !important
              - padding: 0 !important
              - border: none !important
      styles:
        card:
          - border-radius: 12px
          - box-shadow: none
          - margin: 24px 0 0
          - height: auto
          - padding: 12px
          - background: rgba(255,107,107,0.1)
          - border: 1px solid rgba(255,107,107,0.3)
        custom_fields:
          instructions:
            - width: 100%
            - max-width: 100%
            - min-width: 0
            - white-space: normal
