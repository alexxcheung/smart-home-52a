hemma_washer:
  # -------------------------------------------------------------------------
  # Washer card — extends hemma_entity
  # Entity IDs: includes/hemma_entity_ids.yaml (washer_* keys)
  # Tap  → Bubble Card pop-up on Hallway (navigate to #hemma-washer)
  # Hold → more-info
  # -------------------------------------------------------------------------
  template:
    - hemma_entity

  variables:
    icon: washing_machine

  triggers_update:
    - sensor.hemma_entity_ids
    - sensor.washer_current_status
    - sensor.washer_remaining_time
    - sensor.washer_total_time
    - switch.washer_power
    - binary_sensor.washer_remote_start
    - input_boolean.hemma_washer_delay_start
    - input_datetime.hemma_washer_start_at

  state_display: >
    [[[
      const EID = states['sensor.hemma_entity_ids']?.attributes ?? {};
      const status = states[EID.washer_current_status]?.state ?? '';
      const remaining = states[EID.washer_remaining_time]?.state;
      const total = states[EID.washer_total_time]?.state;
      const delayOn = states[EID.washer_delay_start]?.state === 'on';
      const startAt = states[EID.washer_start_at]?.state;

      const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down'];

      if (runningStates.includes(status)) {
        if (remaining && remaining !== 'unavailable' && remaining !== 'unknown') {
          const rem = Math.ceil((new Date(remaining) - new Date()) / 60000);
          if (rem > 0) return `Running - ${rem} Min Left`;
        }
        if (total && total !== 'unavailable' && total !== 'unknown') {
          return `${total} min total`;
        }
        return status.charAt(0).toUpperCase() + status.slice(1).replace('_', ' ');
      }

      if (delayOn && startAt && startAt !== 'unknown' && startAt !== 'unavailable') {
        const parts = startAt.split(':').map((v) => parseInt(v, 10));
        if (parts.length >= 2 && !Number.isNaN(parts[0]) && !Number.isNaN(parts[1])) {
          const now = new Date();
          const target = new Date(now);
          target.setHours(parts[0], parts[1], 0, 0);
          let diffMin = Math.ceil((target - now) / 60000);
          if (diffMin < 0) diffMin += 24 * 60;
          if (diffMin <= 0) return 'Starts soon';
          return `Starts in ${diffMin} min`;
        }
      }

      const labels = {
        power_off: 'Off',
        sleep: 'Sleep',
        initial: 'Ready',
        reserved: 'Scheduled',
        pause: 'Paused',
        rinse_hold: 'Rinse Hold',
        end: 'Done',
        refreshing: 'Refreshing',
        error: 'Error'
      };

      return labels[status] ?? (status ? status.charAt(0).toUpperCase() + status.slice(1).replace('_', ' ') : '');
    ]]]

  state:
    - operator: template
      value: |
        [[[
          const EID = states['sensor.hemma_entity_ids']?.attributes ?? {};
          const status = states[EID.washer_current_status]?.state ?? '';
          return ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down', 'reserved', 'pause'].includes(status);
        ]]]
      styles:
        card:
          - background: var(--ha-card-background-active)
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-active, var(--primary-text-color))
        state:
          - color: var(--secondary-text-color)
        img_cell:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
        entity_picture:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important

  hold_action:
    action: more-info

  tap_action:
    action: navigate
    navigation_path: '#hemma-washer'
