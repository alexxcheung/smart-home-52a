                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  state:
                    - value: "on"
                      styles:
                        card:
                          - background: "rgba(107,203,119,0.14) !important"
                          - border: "1px solid rgba(107,203,119,0.28) !important"
                        name:
                          - color: "#6bcb77 !important"
                        icon:
                          - color: "#6bcb77 !important"
                  styles:
                    card:
                      - border-radius: 12px
                      - box-shadow: none
                      - margin: 24px 0 0
                      - height: 48px
                      - background: rgba(255,255,255,0.08)
                      - border: 1px solid rgba(255,255,255,0.20)
                    grid:
                      - justify-content: center
                    name:
                      - font-size: 14px
                      - font-weight: 700
                      - text-align: center
                      - color: "#cfd6dd"
                    icon:
                      - color: "#cfd6dd"
                      - width: 20px
                      - height: 20px

                # Start at — button card (tap opens time picker); alignment matches Turn Off
                - type: conditional
                  conditions:
                    - entity: input_boolean.hemma_dishwasher_delay_start
                      state: "on"
                  card:
                    type: custom:button-card
                    entity: input_datetime.hemma_dishwasher_start_at
                    triggers_update:
                      - input_datetime.hemma_dishwasher_start_at
                    template: hemma_plain_button_card
                    show_name: true
                    show_icon: true
                    icon: mdi:clock-outline
                    show_state: true
                    layout: icon_name_state
                    name: Start at
                    tap_action:
                      action: more-info
                    hold_action:
                      action: none
                    double_tap_action:
                      action: none
                    styles:
                      card:
                        - border-radius: 12px
                        - box-shadow: none
                        - margin: 0 0 16px
                        - height: 48px
                        - background: rgba(255,255,255,0.08)
                        - border: 1px solid rgba(255,255,255,0.20)
                      grid:
                        - justify-content: center
                      name:
                        - font-size: 14px
                        - font-weight: 700
                        - text-align: center
                        - color: "#cfd6dd"
                      state:
                        - font-size: 13px
                        - text-align: center
                        - color: "#cfd6dd"
                      icon:
                        - color: "#cfd6dd"
                        - width: 20px
                        - height: 20px

          # ── Dynamic action button ──────────────────────────────────────

          # Remote Start — conditional so popup refreshes; only when ready or finished; disabled when door open or no programme
          - type: conditional
            conditions:
              - entity: sensor.bosch_dishwasher_operation_state
                state:
                  - ready
                  - finished
            card:
              type: custom:button-card
              entity: sensor.bosch_dishwasher_operation_state
              template: hemma_plain_button_card
              show_name: true
              show_icon: true
              icon: mdi:play
              show_state: false
              layout: icon_name_state
              name: Remote Start
              tap_action:
                action: call-service
                service: script.start_dishwasher
              hold_action:
                action: none
              double_tap_action:
                action: none
              state:
                - operator: template
                  value: "[[[ return (states['sensor.bosch_dishwasher_door']?.state || '') !== 'closed'; ]]]"
                  styles:
                    card:
                      - opacity: "0.4 !important"
                      - pointer-events: none !important
                - operator: template
                  value: >
                    [[[
                      const prog = states['select.bosch_dishwasher_selected_programme']?.state;
                      return !prog || prog === 'unknown' || prog === 'unavailable' || prog === '';
                    ]]]
                  styles:
                    card:
                      - opacity: "0.35 !important"
                      - pointer-events: none !important
              styles:
                card:
                  - border-radius: 12px
                  - box-shadow: none
                  - margin: 24px 0 16px
                  - height: 48px
                  - background: rgba(107,203,119,0.14)
                  - border: 1px solid rgba(107,203,119,0.28)
                grid:
                  - justify-content: center
                name:
                  - font-size: 14px
                  - font-weight: 700
                  - text-align: center
                  - color: "#6bcb77"
                icon:
                  - color: "#6bcb77"
                  - width: 20px
                  - height: 20px

          # Start Now — conditional so popup refreshes when state leaves delayedstart
          - type: conditional
            conditions:
              - entity: sensor.bosch_dishwasher_operation_state
                state: delayedstart
            card:
              type: custom:button-card
              entity: sensor.bosch_dishwasher_operation_state
              template: hemma_plain_button_card
              show_name: true
              show_icon: true
              icon: mdi:play-circle
              show_state: false
              layout: icon_name_state
              name: Start Now
              tap_action:
                action: call-service
                service: number.set_value
                service_data:
                  entity_id: number.bosch_dishwasher_start_in_relative
                  value: 0
              hold_action:
                action: none
              double_tap_action:
                action: none
              styles:
                card:
                  - border-radius: 12px
                  - box-shadow: none
                  - margin: 24px 0 8px
                  - height: 48px
                  - background: rgba(255,209,102,0.14)
                  - border: 1px solid rgba(255,209,102,0.28)
                grid:
                  - justify-content: center
                name:
                  - font-size: 14px
                  - font-weight: 700
                  - text-align: center
                  - color: "#ffd166"
                icon:
                  - color: "#ffd166"
                  - width: 20px
                  - height: 20px

          # Stop Programme — conditional so popup refreshes when state leaves run/pause/delayedstart/ etc.
          - type: conditional
            conditions:
              - entity: sensor.bosch_dishwasher_operation_state
                state:
                  - delayedstart
                  - run
                  - pause
                  - actionrequired
                  - error
                  - aborting
            card:
              type: custom:button-card
              entity: sensor.bosch_dishwasher_operation_state
              template: hemma_plain_button_card
              show_name: true
              show_icon: true
              icon: mdi:stop
              show_state: false
              layout: icon_name_state
              name: >
                [[[
                  return { delayedstart: 'Cancel programme', run: 'Stop Programme', pause: 'Stop Programme',
                    actionrequired: 'Stop Programme', error: 'Stop / Reset',
                    aborting: 'Stopping…' }[entity.state] ?? 'Stop Programme';
                ]]]
              tap_action:
                action: call-service
                service: button.press
                service_data:
                  entity_id: button.bosch_dishwasher_stop_programme
              hold_action:
                action: none
              double_tap_action:
                action: none
              state:
                - value: aborting
                  styles:
                    card:
                      - opacity: "0.45 !important"
                      - pointer-events: none !important
              styles:
                card:
                  - border-radius: 12px
                  - box-shadow: none
                  - margin: 0 0 16px
                  - height: 48px
                  - background: rgba(255,107,107,0.14)
                  - border: 1px solid rgba(255,107,107,0.28)
                grid:
                  - justify-content: center
                name:
                  - font-size: 14px
                  - font-weight: 700
                  - text-align: center
                  - color: "#ff6b6b"
                icon:
                  - color: "#ff6b6b"
                  - width: 20px
                  - height: 20px
