                  service: select.select_option
                  service_data:
                    entity_id: select.bosch_dishwasher_selected_programme
                    option: dishcare_dishwasher_program_eco_50
                hold_action:
                  action: none
                double_tap_action:
                  action: none
                state:
                  - value: dishcare_dishwasher_program_eco_50
                    styles:
                      card:
                        - background: "rgba(255,255,255,0.92) !important"
                        - border: "1.5px solid transparent !important"
                        - box-shadow: "0 2px 8px rgba(0,0,0,0.25) !important"
                      name:
                        - color: "#1a1a1a !important"
                        - opacity: "1 !important"
                styles:
                  card:
                    - border-radius: 20px
                    - border: 1.5px solid rgba(255,255,255,0.14)
                    - background: transparent
                    - box-shadow: none
                    - height: auto
                    - padding: 8px 4px
                    - overflow: hidden
                    - min-width: 0
                    - flex: 1 1 0
                    - margin: 0 2px 0 0
                  name:
                    - font-size: 13px
                    - font-weight: 600
                    - opacity: "0.45"

              - type: custom:button-card
