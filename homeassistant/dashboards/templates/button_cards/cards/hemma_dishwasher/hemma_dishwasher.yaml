hemma_dishwasher:
  # -------------------------------------------------------------------------
  # Bosch Dishwasher card — extends hemma_entity
  # Entity IDs: includes/hemma_entity_ids.yaml (dishwasher_* keys)
  # Tap         → Bubble Card pop-up on Kitchen (navigate to #hemma-dishwasher)
  # Hold        → more-info
  # Double-tap  → turn dishwasher power off
  # -------------------------------------------------------------------------
  template:
    - hemma_entity

  variables:
    icon: dishwasher

  triggers_update:
    - sensor.hemma_entity_ids
    - sensor.bosch_dishwasher_operation_state
    - sensor.bosch_dishwasher_programme_finish_time
    - sensor.bosch_dishwasher_programme_progress
    - switch.bosch_dishwasher_power
    - number.bosch_dishwasher_start_in_relative
    - input_boolean.hemma_dishwasher_delay_start
    - input_datetime.hemma_dishwasher_start_at
    - sensor.time

  state_display: >
    [[[
      const EID = states['sensor.hemma_entity_ids']?.attributes ?? {};
      const op   = (states[EID.dishwasher_operation_state]?.state ?? '').toString().toLowerCase();
      const fin  = states[EID.dishwasher_programme_finish_time]?.state;
      const prog = parseFloat(states[EID.dishwasher_programme_progress]?.state ?? 0);
      const secsUntilStartAt = (startAtRaw) => {
        if (!startAtRaw || startAtRaw === 'unknown' || startAtRaw === 'unavailable') return null;
        const p = startAtRaw.split(':').map((x) => parseInt(x, 10));
        if (p.length < 2 || Number.isNaN(p[0]) || Number.isNaN(p[1])) return null;
        const now = new Date();
        const target = new Date(now);
        target.setHours(p[0], p[1], p[2] || 0, 0);
        if (target <= now) target.setDate(target.getDate() + 1);
        return Math.max(0, Math.floor((target - now) / 1000));
      };
      const formatStartsIn = (dSec) => {
        const h = Math.floor(dSec / 3600);
        const m = Math.floor((dSec % 3600) / 60);
        return h > 0 ? `Starts in ${h}h ${m}m` : `Starts in ${m}m`;
      };
      if (op === 'run') {
        if (fin && fin !== 'unavailable' && fin !== 'unknown') {
          const rem = Math.ceil((new Date(fin) - new Date()) / 60000);
          if (rem > 0) return `${rem} min left`;
        }
        return prog > 0 ? `Running · ${prog}%` : 'Running';
      }
      if (op === 'delayedstart') {
        const delayOn = states[EID.dishwasher_delay_start]?.state === 'on';
        const startAt = states[EID.dishwasher_start_at]?.state;
        const fromStartAt = delayOn ? secsUntilStartAt(startAt) : null;
        const dSec = fromStartAt ?? parseFloat(states[EID.dishwasher_start_in_relative]?.state ?? 0);
        if (dSec > 0) return formatStartsIn(dSec);
      }
      return {
        inactive: 'Off', ready: 'Ready', delayedstart: 'Delayed start',
        pause: 'Paused', actionrequired: 'Action needed',
        finished: 'Done', error: 'Error', aborting: 'Stopping…',
      }[op] ?? (op ? op.charAt(0).toUpperCase() + op.slice(1) : '');
    ]]]

  state:
    - operator: template
      value: |
        [[[
          const EID = states['sensor.hemma_entity_ids']?.attributes ?? {};
          return ['run','delayedstart','pause'].includes(
            (states[EID.dishwasher_operation_state]?.state ?? '').toString().toLowerCase()
          );
        ]]]
      styles:
        card:
          - background: var(--ha-card-background-active)
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-active, var(--primary-text-color))
        state:
          - color: var(--secondary-text-color)
        img_cell:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
        entity_picture:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important

  hold_action:
    action: more-info

  tap_action:
    action: navigate
    navigation_path: '#hemma-dishwasher'

  double_tap_action:
    action: call-service
    service: switch.turn_off
    service_data:
      entity_id: '[[[ return states["sensor.hemma_entity_ids"]?.attributes?.dishwasher_power ]]]'
