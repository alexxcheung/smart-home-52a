hemma_washer:
  # -------------------------------------------------------------------------
  # Washer card — extends hemma_entity
  # Tap  → control popup (status, power, delay, start/stop)
  # Hold → more-info
  # -------------------------------------------------------------------------
  template:
    - hemma_entity

  variables:
    icon: washing_machine

  triggers_update:
    - sensor.washer_current_status
    - sensor.washer_remaining_time
    - sensor.washer_total_time
    - switch.washer_power
    - binary_sensor.washer_remote_start

  state_display: >
    [[[
      const status = states['sensor.washer_current_status']?.state ?? '';
      const remaining = states['sensor.washer_remaining_time']?.state;
      const total = states['sensor.washer_total_time']?.state;
      
      // Running states
      const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down'];
      
      if (runningStates.includes(status)) {
        if (remaining && remaining !== 'unavailable' && remaining !== 'unknown') {
          const rem = Math.ceil((new Date(remaining) - new Date()) / 60000);
          if (rem > 0) return `${rem} min left`;
        }
        if (total && total !== 'unavailable' && total !== 'unknown') {
          return `${total} min total`;
        }
        return status.charAt(0).toUpperCase() + status.slice(1).replace('_', ' ');
      }
      
      // Status labels
      const labels = {
        power_off: 'Off',
        sleep: 'Sleep',
        initial: 'Ready',
        reserved: 'Scheduled',
        pause: 'Paused',
        rinse_hold: 'Rinse Hold',
        end: 'Done',
        refreshing: 'Refreshing',
        error: 'Error'
      };
      
      return labels[status] ?? (status ? status.charAt(0).toUpperCase() + status.slice(1).replace('_', ' ') : '');
    ]]]

  state:
    - operator: template
      value: |
        [[[
          const status = states['sensor.washer_current_status']?.state ?? '';
          return ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down', 'reserved', 'pause'].includes(status);
        ]]]
      styles:
        card:
          - background: var(--ha-card-background-active)
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-active, var(--primary-text-color))
        state:
          - color: var(--secondary-text-color)
        img_cell:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
        entity_picture:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important

  hold_action:
    action: more-info

  tap_action:
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        title: Washing Machine
        size: normal
        style: |
          --popup-max-width: 480px;
          }
          ha-dialog {
            --mdc-dialog-max-width: 480px !important;
            --vertical-align-dialog: center !important;
            --dialog-surface-margin-top: auto !important;
          }
          .mdc-dialog .mdc-dialog__surface {
            max-width: 480px !important;
            width: 480px !important;
          }
        content:
          type: vertical-stack
          cards:

            # ── Status header ──────────────────────────────────────────────
            - type: custom:button-card
              template: hemma_plain_button_card
              entity: sensor.washer_current_status
              tap_action: { action: none }
              styles: { card: [ { background: transparent }, { box-shadow: none }, { border: none } ] }
              custom_fields:
                content: >
                  [[[
                    const status = entity.state ?? 'unknown';
                    const remaining = states['sensor.washer_remaining_time']?.state;
                    const total = parseFloat(states['sensor.washer_total_time']?.state ?? 0);
                    const remoteStart = states['binary_sensor.washer_remote_start']?.state === 'on';
                    
                    const labels = {
                      power_off: 'Off', sleep: 'Sleep', initial: 'Ready', reserved: 'Scheduled',
                      running: 'Running', spinning: 'Spinning', rinsing: 'Rinsing', drying: 'Drying',
                      detecting: 'Detecting', cool_down: 'Cooling Down', pause: 'Paused',
                      rinse_hold: 'Rinse Hold', end: 'Done', refreshing: 'Refreshing', error: 'Error'
                    };
                    
                    const colors = {
                      running: '#6bcb77', spinning: '#6bcb77', rinsing: '#6bcb77', drying: '#6bcb77',
                      detecting: '#6bcb77', cool_down: '#6bcb77', end: '#6bcb77',
                      error: '#ff6b6b', pause: '#ffd166', rinse_hold: '#ffd166', reserved: '#ffd166'
                    };
                    
                    const bgColors = {
                      running: 'rgba(107,203,119,0.08)', spinning: 'rgba(107,203,119,0.08)',
                      rinsing: 'rgba(107,203,119,0.08)', drying: 'rgba(107,203,119,0.08)',
                      detecting: 'rgba(107,203,119,0.08)', cool_down: 'rgba(107,203,119,0.08)',
                      end: 'rgba(107,203,119,0.06)', error: 'rgba(255,107,107,0.08)',
                      pause: 'rgba(255,209,102,0.07)', rinse_hold: 'rgba(255,209,102,0.07)',
                      reserved: 'rgba(255,209,102,0.07)', initial: 'rgba(255,255,255,0.05)',
                      power_off: 'rgba(255,255,255,0.05)', sleep: 'rgba(255,255,255,0.05)'
                    };
                    
                    const color = colors[status] ?? 'var(--primary-text-color)';
                    const bg = bgColors[status] ?? 'transparent';
                    
                    let progress = 0;
                    let remStr = '';
                    const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down'];
                    
                    if (runningStates.includes(status) && remaining && remaining !== 'unavailable') {
                      const rem = Math.ceil((new Date(remaining) - new Date()) / 60000);
                      if (rem > 0) {
                        remStr = `${rem} min remaining`;
                        if (total > 0) {
                          progress = Math.round(((total - rem) / total) * 100);
                        }
                      }
                    }
                    
                    return `
                      <div class="washer-header">
                        <div class="status-row">
                          <span class="status-label" style="color:${color};background:${bg}">${labels[status] ?? status}</span>
                          ${!remoteStart && status !== 'power_off' ? '<span class="warn-badge">Remote Start Disabled</span>' : ''}
                        </div>
                        ${progress > 0 ? `
                          <div class="prog-wrap">
                            <div class="prog-bar">
                              <div class="prog-fill" style="width:${progress}%;background:${color}"></div>
                            </div>
                            <span class="prog-info" style="color:${color}">${progress}%${remStr ? ' · ' + remStr : ''}</span>
                          </div>
                        ` : ''}
                      </div>
                    `;
                  ]]]
              extra_styles: |
                .washer-header { padding: 16px 16px 12px; border-radius: 12px; box-sizing: border-box; max-width: 100%; transition: background 0.3s ease; }
                .status-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
                .status-label { font-size: 11px; font-weight: 700; letter-spacing: 0.03em; padding: 8px; border-radius: 8px; display: inline-block; }
                .prog-wrap { margin-bottom: 2px; } .prog-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
                .prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; } .prog-info { font-size: 11px; opacity: 0.75; font-weight: 600; }
                .warn-badge { font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 8px; background: rgba(244,162,97,0.18); color: #f4a261; letter-spacing: 0.03em; display: inline-block; }

            # ── Message: Power off - need to enable Remote Start at machine ──
            - type: custom:button-card
              entity: sensor.washer_current_status
              triggers_update:
                - sensor.washer_current_status
              template: hemma_plain_button_card
              show_name: false
              show_icon: false
              tap_action:
                action: none
              custom_fields:
                instructions: |
                  [[[
                    return `
                      <div style="text-align: center; padding: 8px 0;">
                        <div style="font-size: 13px; font-weight: 600; color: var(--secondary-text-color); opacity: 0.8; margin-bottom: 8px;">
                          To enable remote control:
                        </div>
                        <div style="font-size: 12px; color: var(--secondary-text-color); opacity: 0.6; line-height: 1.6;">
                          1. Press Power on the machine<br>
                          2. Hold Remote Start for 3 sec<br>
                          3. Wait for door to lock
                        </div>
                      </div>
                    `;
                  ]]]
              state:
                - value: "power_off"
                  styles:
                    card:
                      - display: flex !important
                - operator: default
                  styles:
                    card:
                      - display: none !important
              styles:
                card:
                  - border-radius: 12px
                  - box-shadow: none
                  - margin: 24px 0 16px
                  - height: auto
                  - padding: 12px
                  - background: rgba(255,255,255,0.05)
                  - border: 1px dashed rgba(255,255,255,0.2)

            # ── Remote Start status indicator (when powered on but remote start not enabled) ──
            - type: custom:button-card
              entity: binary_sensor.washer_remote_start
              triggers_update:
                - binary_sensor.washer_remote_start
                - sensor.washer_current_status
              template: hemma_plain_button_card
              show_name: false
              show_icon: false
              tap_action:
                action: none
              custom_fields:
                instructions: |
                  [[[
                    return `
                      <div style="text-align: center; padding: 8px 0;">
                        <div style="font-size: 13px; font-weight: 600; color: #f4a261; margin-bottom: 8px;">
                          ⚠ Remote Start not enabled
                        </div>
                        <div style="font-size: 12px; color: var(--secondary-text-color); opacity: 0.6; line-height: 1.6;">
                          Hold Remote Start button on machine for 3 sec
                        </div>
                      </div>
                    `;
                  ]]]
              state:
                - operator: template
                  value: |
                    [[[
                      const status = states['sensor.washer_current_status']?.state;
                      const remoteStart = entity.state;
                      return status !== 'power_off' && status !== 'sleep' && remoteStart === 'off';
                    ]]]
                  styles:
                    card:
                      - display: flex !important
                - operator: default
                  styles:
                    card:
                      - display: none !important
              styles:
                card:
                  - border-radius: 12px
                  - box-shadow: none
                  - margin: 24px 0 16px
                  - height: auto
                  - padding: 12px
                  - background: rgba(244,162,97,0.1)
                  - border: 1px solid rgba(244,162,97,0.3)

            # ── Remote Start enabled indicator ──
            - type: custom:button-card
              entity: binary_sensor.washer_remote_start
              triggers_update:
                - binary_sensor.washer_remote_start
                - sensor.washer_current_status
              template: hemma_plain_button_card
              show_name: true
              show_icon: true
              icon: mdi:check-circle
              name: Remote Start Enabled
              tap_action:
                action: none
              state:
                - operator: template
                  value: |
                    [[[
                      const status = states['sensor.washer_current_status']?.state;
                      const remoteStart = entity.state;
                      const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'pause'];
                      return remoteStart === 'on' && !runningStates.includes(status);
                    ]]]
                  styles:
                    card:
                      - display: flex !important
                - operator: default
                  styles:
                    card:
                      - display: none !important
              styles:
                card:
                  - border-radius: 12px
                  - box-shadow: none
                  - margin: 24px 0 0
                  - height: 48px
                  - background: rgba(107,203,119,0.1)
                  - border: 1px solid rgba(107,203,119,0.3)
                grid:
                  - justify-content: center
                name:
                  - font-size: 14px
                  - font-weight: 600
                  - text-align: center
                  - color: "#6bcb77"
                icon:
                  - color: "#6bcb77"
                  - width: 20px
                  - height: 20px

            # ── Power: Turn Off (shown when on and not running) ───────────────────────────
            - type: custom:button-card
              entity: sensor.washer_current_status
              triggers_update:
                - sensor.washer_current_status
              template: hemma_plain_button_card
              show_name: true
              show_icon: true
              icon: mdi:power
              show_state: false
              layout: icon_name_state
              name: Turn Off
              tap_action:
                action: call-service
                service: select.select_option
                service_data:
                  entity_id: select.washer_operation
                  option: power_off
              hold_action:
                action: none
              state:
                - operator: template
                  value: >
                    [[[
                      const status = entity.state;
                      const runningStates = ['running', 'spinning', 'rinsing', 'drying', 'detecting', 'cool_down', 'pause'];
                      return ['power_off', 'sleep'].includes(status) || runningStates.includes(status);
                    ]]]
                  styles:
                    card:
                      - display: none !important
              styles:
                card:
                  - border-radius: 12px
                  - box-shadow: none
                  - margin: 12px 0 16px
                  - height: 48px
                  - background: rgba(255,107,107,0.14)
                grid:
                  - justify-content: center
                name:
                  - font-size: 14px
                  - font-weight: 700
                  - text-align: center
                  - color: "#ff6b6b"
                icon:
                  - color: "#ff6b6b"
                  - width: 20px
                  - height: 20px

            # ── Controls (only when power is on) ──────────────────────────
            - type: conditional
              conditions:
                - entity: sensor.washer_current_status
                  state_not: "power_off"
                - entity: sensor.washer_current_status
                  state_not: "sleep"
              card:
                type: vertical-stack
                cards:
                  # ── Delay Start Section ─────────────────────────────────
                  - type: custom:button-card
                    entity: sensor.washer_current_status
                    name: Delay Start
                    show_icon: false
                    show_state: false
                    tap_action:
                      action: none
                    styles:
                      card:
                        - background: transparent
                        - box-shadow: none
                        - padding: 24px 0 6px
                        - height: auto
                        - justify-content: flex-start
                      name:
                        - font-size: 11px
                        - font-weight: 700
                        - text-transform: uppercase
                        - letter-spacing: 0.08em
                        - opacity: "0.38"
                        - text-align: left

                  # ── Delay toggle button ────────────────────────────────
                  - type: custom:button-card
                    entity: input_boolean.hemma_washer_delay_start
                    triggers_update:
                      - input_boolean.hemma_washer_delay_start
                    template: hemma_plain_button_card
                    show_name: true
                    show_icon: true
                    icon: mdi:clock-outline
                    show_state: false
                    layout: icon_name_state
                    name: Enable delay start
                    tap_action:
                      action: toggle
                    state:
                      - value: "on"
                        icon: mdi:clock-check
                        styles:
                          card:
                            - background: rgba(107,203,119,0.14)
                            - border: 1px solid rgba(107,203,119,0.3)
                          name:
                            - color: "#6bcb77"
                          icon:
                            - color: "#6bcb77"
                      - value: "off"
                        styles:
                          card:
                            - background: rgba(255,255,255,0.05)
                            - border: 1px solid rgba(255,255,255,0.12)
                          name:
                            - color: var(--primary-text-color)
                          icon:
                            - color: var(--primary-text-color)
                    styles:
                      card:
                        - border-radius: 12px
                        - box-shadow: none
                        - height: 48px
                        - margin: 0
                      grid:
                        - justify-content: center
                      name:
                        - font-size: 14px
                        - font-weight: 600
                      icon:
                        - width: 20px
                        - height: 20px

                  # ── Time picker (shown when delay is enabled) ──────────
                  - type: conditional
                    conditions:
                      - entity: input_boolean.hemma_washer_delay_start
                        state: "on"
                    card:
                      type: custom:button-card
                      entity: input_datetime.hemma_washer_start_at
                      triggers_update:
                        - input_datetime.hemma_washer_start_at
                      show_icon: false
                      show_name: false
                      tap_action:
                        action: more-info
                      custom_fields:
                        time_display: |
                          [[[
                            const time = entity.state;
                            if (!time || time === 'unknown') return 'Tap to set time';
                            const parts = time.split(':');
                            const h = parseInt(parts[0]);
                            const m = parts[1];
                            return `Start at ${h}:${m}`;
                          ]]]
                      styles:
                        card:
                          - background: rgba(255,209,102,0.1)
                          - border: 1px solid rgba(255,209,102,0.3)
                          - border-radius: 12px
                          - box-shadow: none
                          - height: 48px
                          - margin: 8px 0 0
                        custom_fields:
                          time_display:
                            - font-size: 16px
                            - font-weight: 700
                            - color: "#ffd166"

                  # ── Start button (calls script that handles delay calculation) ──
                  - type: conditional
                    conditions:
                      - entity: sensor.washer_current_status
                        state_not: running
                      - entity: sensor.washer_current_status
                        state_not: spinning
                      - entity: sensor.washer_current_status
                        state_not: rinsing
                      - entity: sensor.washer_current_status
                        state_not: drying
                      - entity: sensor.washer_current_status
                        state_not: pause
                    card:
                      type: custom:button-card
                      entity: binary_sensor.washer_remote_start
                      triggers_update:
                        - binary_sensor.washer_remote_start
                        - sensor.washer_current_status
                        - input_boolean.hemma_washer_delay_start
                      template: hemma_plain_button_card
                      show_name: true
                      show_icon: true
                      icon: mdi:play
                      show_state: false
                      layout: icon_name_state
                      name: |
                        [[[
                          const delayOn = states['input_boolean.hemma_washer_delay_start']?.state === 'on';
                          return delayOn ? 'Start with Delay' : 'Start Now';
                        ]]]
                      tap_action:
                        action: call-service
                        service: script.start_washer
                      state:
                        - value: "off"
                          styles:
                            card:
                              - opacity: 0.5
                              - pointer-events: none
                            name:
                              - color: "var(--secondary-text-color) !important"
                            icon:
                              - color: "var(--secondary-text-color) !important"
                      styles:
                        card:
                          - border-radius: 12px
                          - box-shadow: none
                          - margin: 24px 0 16px
                          - height: 48px
                          - background: rgba(107,203,119,0.14)
                        grid:
                          - justify-content: center
                        name:
                          - font-size: 14px
                          - font-weight: 700
                          - text-align: center
                          - color: "#6bcb77"
                        icon:
                          - color: "#6bcb77"
                          - width: 20px
                          - height: 20px

                  # ── Stop button (when running) ──────────────────────────
                  - type: conditional
                    conditions:
                      - entity: sensor.washer_current_status
                        state_not: power_off
                      - entity: sensor.washer_current_status
                        state_not: sleep
                      - entity: sensor.washer_current_status
                        state_not: initial
                      - entity: sensor.washer_current_status
                        state_not: end
                    card:
                      type: custom:button-card
                      entity: sensor.washer_current_status
                      triggers_update:
                        - sensor.washer_current_status
                      template: hemma_plain_button_card
                      show_name: true
                      show_icon: true
                      icon: mdi:stop
                      show_state: false
                      layout: icon_name_state
                      name: Stop
                      tap_action:
                        action: call-service
                        service: select.select_option
                        service_data:
                          entity_id: select.washer_operation
                          option: stop
                      styles:
                        card:
                          - border-radius: 12px
                          - box-shadow: none
                          - margin: 0 0 16px
                          - height: 48px
                          - background: rgba(255,107,107,0.14)
                        grid:
                          - justify-content: center
                        name:
                          - font-size: 14px
                          - font-weight: 700
                          - text-align: center
                          - color: "#ff6b6b"
                        icon:
                          - color: "#ff6b6b"
                          - width: 20px
                          - height: 20px
