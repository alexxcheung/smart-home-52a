# Nav shell: same navigation bar structure as hemma_room (desktop nav + menu + time)
# Use this as the first card on non-room views (e.g. Info) so the nav matches room views.
hemma_nav_shell:
  triggers_update:
    - input_boolean.hemma_show_ha_chrome

  template:
    - hemma_default
  show_name: false
  show_icon: false
  show_state: false
  tap_action: { action: none }
  hold_action: { action: none }

  custom_fields:
    navigation:
      card: !include /config/dashboards/templates/includes/hemma_navigation.yaml
    menu:
      card:
        type: custom:button-card
        template: hemma_menu_icon
        variables:
          hemma_info_scroll_hide_menu: >
            [[[ return variables.hemma_info_scroll_hide_menu === true; ]]]
    time:
      card:
        type: custom:button-card
        template: hemma_time

  styles:
    card:
      - height: 0 !important
      - min-height: 0 !important
      - overflow: visible !important
      - padding: 0 !important
      - margin: 0 !important
      - border: none !important
      - box-shadow: none !important
      - background: none !important
    grid:
      - height: 0 !important
      - min-height: 0 !important
      - overflow: visible !important
    custom_fields:
      # Top: hemma_show_ha_chrome on = under strip; off = wall (Mac kiosk may keep app-header in DOM — boolean still controls gap).
      navigation:
        - position: fixed
        - top: >
            [[[
              const chromeOn = hass.states['input_boolean.hemma_show_ha_chrome']?.state === 'on';
              if (!chromeOn) return 'calc(var(--hemma-menu-top-when-header-hidden, 28px) + env(safe-area-inset-top, 0px))';
              return 'var(--hemma-nav-strip-top, calc(var(--hemma-header-offset, calc(var(--header-height, 56px) + var(--safe-area-inset-top, 0px))) + var(--hemma-nav-strip-gap, 8px) + var(--hemma-menu-below-header-nudge, 4px)))';
            ]]]
        - transition: top var(--ha-animation-duration-normal, 200ms) ease
        - left: var(--mdc-drawer-width, 0px)
        - right: 0
        - z-index: 50
        - overflow: visible
        - pointer-events: auto
        - "--mdc-ripple-press-opacity": 0
        - "-webkit-tap-highlight-color": transparent
        - filter: none
      time:
        - display: >
            [[[
              const w = window?.innerWidth || 1024;
              const h = window?.innerHeight || 800;
              const isMobile = w <= 767 || h <= 500;
              return isMobile ? 'none' : 'block';
            ]]]
        - position: fixed
        - top: >
            [[[
              const chromeOn = hass.states['input_boolean.hemma_show_ha_chrome']?.state === 'on';
              if (!chromeOn) return 'calc(var(--hemma-menu-top-when-header-hidden, 28px) + env(safe-area-inset-top, 0px))';
              return 'var(--hemma-time-strip-top, calc(var(--hemma-header-offset, calc(var(--header-height, 56px) + var(--safe-area-inset-top, 0px))) + 2 * var(--hemma-nav-strip-gap, 8px) + var(--hemma-menu-below-header-nudge, 4px)))';
            ]]]
        - right: 16px
        # Above navigation strip (50) so fixed row does not steal clicks on desktop (pointer: fine).
        - z-index: 100
        - overflow: visible
        - pointer-events: none
        - "--mdc-ripple-press-opacity": 0
        - "-webkit-tap-highlight-color": transparent
      menu:
        - position: fixed
        - top: >
            [[[
              const chromeOn = hass.states['input_boolean.hemma_show_ha_chrome']?.state === 'on';
              const w = window?.innerWidth || 1024;
              const mm = window.matchMedia && window.matchMedia('(orientation: portrait)').matches;
              if (w <= 767 && mm) {
                if (chromeOn) {
                  return 'var(--hemma-header-offset, calc(var(--header-height, 56px) + env(safe-area-inset-top, 0px)))';
                }
                return 'calc(env(safe-area-inset-top, 0px) + 10px)';
              }
              if (!chromeOn) return 'calc(var(--hemma-menu-top-when-header-hidden, 28px) + env(safe-area-inset-top, 0px))';
              return 'var(--hemma-nav-strip-top, calc(var(--hemma-header-offset, calc(var(--header-height, 56px) + var(--safe-area-inset-top, 0px))) + var(--hemma-nav-strip-gap, 8px) + var(--hemma-menu-below-header-nudge, 4px)))';
            ]]]
        - left: >
            [[[
              const w = window?.innerWidth || 1024;
              const h = window?.innerHeight || 800;
              const portrait = window.matchMedia && window.matchMedia('(orientation: portrait)').matches;
              if (w <= 767 && portrait) {
                return 'env(safe-area-inset-left, 0px)';
              }
              const dw = 'var(--mdc-drawer-width, 0px)';
              const minIn = 'var(--hemma-menu-inset-inline-when-drawer-hidden, 16px)';
              if (w <= 767 || h <= 500) {
                return `max(${minIn}, calc(${dw} + var(--hero-gutter) - 11px))`;
              }
              return `max(${minIn}, calc(${dw} + var(--hero-gutter) - 6px))`;
            ]]]
        - width: >
            [[[
              const w = window?.innerWidth || 1024;
              const portrait = window.matchMedia && window.matchMedia('(orientation: portrait)').matches;
              if (w <= 767 && portrait) return '48px';
              return '40px';
            ]]]
        - height: >
            [[[
              const w = window?.innerWidth || 1024;
              const portrait = window.matchMedia && window.matchMedia('(orientation: portrait)').matches;
              if (w <= 767 && portrait) return '48px';
              return '40px';
            ]]]
        # Above navigation strip (50); :host z-index inside menu card cannot outrank sibling fields.
        - z-index: 100
        - pointer-events: auto
        - cursor: pointer
