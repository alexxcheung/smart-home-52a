hemma_badge_scenes:
  template: [hemma_badge_base]

  variables:
    enabled: false
    room: null
    room_label: Room

  icon: mdi:palette

  tap_action:
    action: navigate
    navigation_path: "[[[ return '#hemma-scenes-' + (variables.room || '').replace(/_/g, '-') ]]]"

  name: >
    [[[
      const room = variables.room;
      const selectId = `input_text.hemma_${room}_scene`;
      const raw = states[selectId]?.state;
      const hasScene = raw && raw !== 'unknown' && raw !== '';
      return `
        <div class="mp-wrap">
          <div class="mp-title">Scenes</div>
          ${hasScene ? `<div class="mp-sub">${raw}</div>` : ''}
        </div>
      `;
    ]]]

  styles:
    card:
      - display: >
          [[[
            const ev = variables?.enabled;
            const enabled = (ev === undefined || ev === null) ? false :
              (typeof ev === 'boolean') ? ev :
              (typeof ev === 'number') ? ev !== 0 :
              !['false','0','no','off','disabled'].includes(String(ev).trim().toLowerCase());
            return enabled ? 'inline-grid' : 'none';
          ]]]
    icon:
      - color: rgba(255,255,255,0.75)

  extra_styles: >
    [[[
      const ev = variables?.enabled;
      const enabled = (ev === undefined || ev === null) ? false :
        (typeof ev === 'boolean') ? ev :
        (typeof ev === 'number') ? ev !== 0 :
        !['false','0','no','off','disabled'].includes(String(ev).trim().toLowerCase());
      return `:host{display:${enabled ? 'inline-block' : 'none'} !important;}`;
    ]]]
