  # ----- 4. The Engine -----
  - type: custom:button-card
    template: hemma_plain_button_card
    class: hemma-info-section-title
    tap_action:
      action: none
    custom_fields:
      content: |
        [[[
          return `<div style="padding:0 2px 0 24px;box-sizing:border-box;max-width:100%;">
            <div style="font-size:clamp(1.275rem,2vw,1.525rem);font-weight:700;line-height:1.2;color:var(--primary-text-color);">The Engine</div>
            <div style="opacity:0.58;font-size:16px;margin-top:6px;line-height:1.35;color:var(--primary-text-color);padding-bottom:12px;box-sizing:border-box;">System & Security</div>
          </div>`;
        ]]]
    styles:
      card:
        - background: transparent
        - border: none
        - box-shadow: none
        - border-radius: 0
        - margin: 8px 0 12px 0
        - padding: 0
        - width: 100%
  - type: custom:layout-card
    class: hemma-info-strip
    layout_type: custom:grid-layout
    layout: !include /config/dashboards/templates/hemma_info/hemma_info_row_scroll_text.yaml
    card_mod: !include /config/dashboards/templates/hemma_info/hemma_info_strip_card_mod.yaml
    cards:
      - type: custom:button-card
        template: hemma_plain_button_card
        tap_action:
          action: navigate
          navigation_path: '#hemma-system-log'
        triggers_update: all
        custom_fields:
          content: |
            [[[
              const includeDomains = new Set([
                'alarm_control_panel',
                'binary_sensor',
                'climate',
                'cover',
                'fan',
                'humidifier',
                'input_boolean',
                'input_select',
                'light',
                'lock',
                'media_player',
                'switch'
              ]);

              const entries = Object.values(states)
                .filter((obj) => {
                  const [domain] = String(obj.entity_id || '').split('.');
                  if (!includeDomains.has(domain)) return false;
                  return !['unknown', 'unavailable'].includes(String(obj.state));
                })
                .sort((a, b) => new Date(b.last_changed) - new Date(a.last_changed))
                .slice(0, 5);

              const stateLabel = (state) => {
                if (state === 'on') return 'On';
                if (state === 'off') return 'Off';
                return String(state).replace(/_/g, ' ');
              };

              const lines = entries.map((obj) => {
                const ts = new Date(obj.last_changed).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const name = obj.attributes?.friendly_name || obj.entity_id;
                return `<div style="font-size:14px;font-weight:400;opacity:0.9;color:var(--primary-text-color);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"><span style="font-weight:700;">${ts}</span> - ${name} -> ${stateLabel(obj.state)}</div>`;
              }).join('');

              const empty = `<div style="font-size:14px;opacity:0.5;margin-top:8px;">No recent device updates</div>`;

              return `<div style="padding:18px 20px;box-sizing:border-box;min-height:120px;">
                <div style="font-size:12px;font-weight:700;opacity:0.55;text-transform:uppercase;letter-spacing:0.08em;">Device Log</div>
                ${lines || empty}
              </div>`;
            ]]]
        styles:
          card:
            - background: rgba(255,255,255,0.06)
            - backdrop-filter: blur(20px)
            - border-radius: 22px
            - border: 1px solid rgba(255,255,255,0.12)
      # Powered by the built-in System Monitor integration. Add it via
      # Settings -> Devices & Services -> Add Integration -> System Monitor
      # and enable processor_use, memory_use_percent (and optionally
      # processor_temperature). The card auto-detects entity IDs across
      # HA versions, falling back to "-" until matching sensors exist.
      - type: custom:button-card
        template: hemma_plain_button_card
        tap_action:
          action: none
        custom_fields:
          content: |
            [[[
              const pickNum = (candidates) => {
                for (const eid of candidates) {
                  const s = states[eid];
                  if (!s || s.state === 'unknown' || s.state === 'unavailable') continue;
                  const n = parseFloat(s.state);
                  if (!isNaN(n)) return n;
                }
                return null;
              };
              const cpuVal = pickNum([
                'sensor.system_monitor_processor_use',
                'sensor.system_monitor_cpu_use',
                'sensor.processor_use',
                'sensor.cpu_use',
              ]);
              const ramVal = pickNum([
                'sensor.system_monitor_memory_use_percent',
                'sensor.system_monitor_memory_usage',
                'sensor.memory_use_percent',
              ]);
              const tempVal = pickNum([
                'sensor.system_monitor_processor_temperature',
                'sensor.processor_temperature',
              ]);
              const cpu = cpuVal === null ? '-' : `${Math.round(cpuVal)}%`;
              const ram = ramVal === null ? '-' : `${Math.round(ramVal)}%`;
              const subtitle = tempVal === null
                ? `${ram} RAM`
                : `${ram} RAM &middot; ${Math.round(tempVal)}&deg;C`;
              return `<div style="padding:18px 20px;box-sizing:border-box;min-height:120px;">
                <div style="font-size:12px;font-weight:700;opacity:0.55;text-transform:uppercase;letter-spacing:0.08em;">HA Host</div>
                <div style="font-size:19px;font-weight:600;margin-top:8px;">${cpu} CPU</div>
                <div style="font-size:14px;opacity:0.5;margin-top:6px;">${subtitle}</div>
              </div>`;
            ]]]
        styles:
          card:
            - background: rgba(255,255,255,0.06)
            - backdrop-filter: blur(20px)
            - border-radius: 22px
            - border: 1px solid rgba(255,255,255,0.12)
      # Powered by the Speedtest.net integration. Add it via Settings ->
      # Devices & Services -> Add Integration -> Speedtest.net (no auth
      # required). It creates sensor.speedtest_download (Mbit/s),
      # sensor.speedtest_upload (Mbit/s), and sensor.speedtest_ping (ms),
      # which this card reads directly. Falls back to "-" until the
      # first scan completes.
      - type: custom:button-card
        template: hemma_plain_button_card
        tap_action:
          action: none
        triggers_update:
          - sensor.speedtest_download
          - sensor.speedtest_upload
          - sensor.speedtest_ping
          # sensor.time is from time_date in configuration.yaml; updates
          # every minute so the "Updated N min ago" label stays fresh
          # between speedtest scans without polling.
          - sensor.time
        custom_fields:
          content: |
            [[[
              const fmt = (eid, unit) => {
                const s = states[eid];
                if (!s || ['unknown', 'unavailable'].includes(s.state)) return '—';
                const n = parseFloat(s.state);
                if (isNaN(n)) return '—';
                return `${Math.round(n)} ${unit}`;
              };
              const relative = (eid) => {
                const s = states[eid];
                if (!s || !s.last_updated) return null;
                const mins = Math.floor((Date.now() - new Date(s.last_updated).getTime()) / 60000);
                if (mins < 1)    return 'just now';
                if (mins < 60)   return `${mins} min ago`;
                const hrs = Math.floor(mins / 60);
                if (hrs < 24)    return `${hrs} hr ago`;
                const days = Math.floor(hrs / 24);
                return `${days} d ago`;
              };
              const dl   = fmt('sensor.speedtest_download', 'Mbps');
              const ul   = fmt('sensor.speedtest_upload',   'Mbps');
              const ping = fmt('sensor.speedtest_ping',     'ms');
              const last = relative('sensor.speedtest_download');
              return `<div style="padding:18px 20px;box-sizing:border-box;min-height:120px;">
                <div style="font-size:12px;font-weight:700;opacity:0.55;text-transform:uppercase;letter-spacing:0.08em;">Internet Speed</div>
                <div style="font-size:19px;font-weight:600;margin-top:8px;">↓ ${dl}</div>
                <div style="font-size:14px;opacity:0.5;margin-top:6px;">↑ ${ul} &middot; ${ping} ping</div>
                ${last ? `<div style="font-size:12px;opacity:0.35;margin-top:6px;">Updated ${last}</div>` : ''}
              </div>`;
            ]]]
        styles:
          card:
            - background: rgba(255,255,255,0.06)
            - backdrop-filter: blur(20px)
            - border-radius: 22px
            - border: 1px solid rgba(255,255,255,0.12)
      - type: custom:button-card
        template: hemma_engine_battery
