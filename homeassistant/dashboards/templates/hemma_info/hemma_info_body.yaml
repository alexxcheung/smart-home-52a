    custom_fields:
      content: |
        [[[
          return `<div style="padding:0 2px 0 24px;box-sizing:border-box;max-width:100%;">
            <div style="font-size:clamp(1.15rem,2vw,1.4rem);font-weight:700;line-height:1.2;color:var(--primary-text-color);">The Engine</div>
            <div style="opacity:0.58;font-size:14px;margin-top:6px;line-height:1.35;color:var(--primary-text-color);padding-bottom:12px;box-sizing:border-box;">System & Security</div>
