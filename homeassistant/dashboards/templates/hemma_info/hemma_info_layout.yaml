# Info — one column, vertical scroll on this grid; horizontal scroll only inside category strips.
# Desktop: horizontal padding stays 0 to avoid widening the column past minmax(0, 1fr) / triggering page scroll.
# Mobile: inset from display edge = env(safe-area-inset-*) + 4px so content clears notches comfortably.
grid-template-columns: minmax(0, 1fr)
grid-auto-rows: auto
grid-column-gap: 0
grid-row-gap: 0
place-content: start
place-items: stretch
width: 100%
max-width: min(1200px, 100%)
margin: 0 auto
padding: 120px 0 calc(28px + env(safe-area-inset-bottom)) 0
box-sizing: border-box
overflow-x: hidden
overflow-y: auto
overscroll-behavior-x: none
overscroll-behavior-y: auto
position: relative
height: 100%
min-height: 0
min-width: 0
touch-action: pan-y

mediaquery:
  "(max-width: 767px) and (orientation: portrait)":
    padding: >-
      32px
      calc(4px + env(safe-area-inset-right, 0px))
      calc(28px + env(safe-area-inset-bottom, 0px))
      calc(4px + env(safe-area-inset-left, 0px))
  "(max-width: 932px) and (orientation: landscape)":
    padding: >-
      120px
      calc(4px + env(safe-area-inset-right, 0px))
      calc(28px + env(safe-area-inset-bottom, 0px))
      calc(4px + env(safe-area-inset-left, 0px))
  "(min-width: 933px)":
    padding: 120px 0 calc(32px + env(safe-area-inset-bottom)) 0
