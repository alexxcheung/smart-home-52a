# Info — one column, vertical scroll on this grid; horizontal scroll only inside category strips.
# Side padding is 0 (horizontal padding caused page-level horizontal scroll in this setup).
grid-template-columns: minmax(0, 1fr)
grid-auto-rows: auto
grid-column-gap: 0
grid-row-gap: 0
place-content: start
place-items: stretch
width: 100%
max-width: min(1200px, 100%)
margin: 0 auto
padding: 120px 0 calc(28px + env(safe-area-inset-bottom)) 0
box-sizing: border-box
overflow-x: hidden
overflow-y: auto
overscroll-behavior-x: none
overscroll-behavior-y: auto
position: relative
height: 100%
min-height: 0
min-width: 0
touch-action: pan-y

mediaquery:
  "(min-width: 933px)":
    padding: 120px 0 calc(32px + env(safe-area-inset-bottom)) 0
