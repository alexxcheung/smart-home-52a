- id: '1771400000001'
  alias: Theme/Core - Hemma Theme Switch To Dark At Sunset
  description: Switch dashboard theme to dark mode when sun sets
  triggers:
  - trigger: sun
    event: sunset
  conditions: []
  actions:
  - action: frontend.set_theme
    data:
      name: Hemma
      mode: dark
  mode: single
- id: '1771400000002'
  alias: Theme/Core - Hemma Theme Switch To Light At Sunrise
  description: Switch dashboard theme to light mode when sun rises
  triggers:
  - trigger: sun
    event: sunrise
  conditions: []
  actions:
  - action: frontend.set_theme
    data:
      name: Hemma
      mode: light
  mode: single
- id: '1771400000003'
  alias: Theme/Core - Hemma Theme Set On HA Start
  description: Set theme mode based on current sun position when HA starts
  triggers:
  - trigger: homeassistant
    event: start
  conditions: []
  actions:
  - action: frontend.set_theme
    data:
      name: Hemma
      mode: '{{ ''dark'' if states(''sun.sun'') == ''below_horizon'' else ''light''
        }}'
  mode: single
