# Hemma — Room Scenes
# 5 rooms × 5 basic scenes: Focus / Relax / Night / Sleep / Away
#
# Scene entity_ids are generated from names (slugified):
#   "Living Room Focus" → scene.living_room_focus
#
# NOTE: Kitchen and Hallway use placeholder light entity IDs.
#       Replace light.kitchen_ceiling / light.hallway_ceiling
#       with your actual entity IDs before activating those scenes.

# ─────────────── Living Room ───────────────
- name: Living Room Focus
  entities:
    light.sofa_light:
      state: on
      brightness_pct: 100
      color_temp_kelvin: 6000
    light.floor_light:
      state: on
      brightness_pct: 100
      color_temp_kelvin: 6000

- name: Living Room Relax
  entities:
    light.sofa_light:
      state: on
      brightness_pct: 30
      color_temp_kelvin: 2200
    light.floor_light:
      state: on
      brightness_pct: 30
      color_temp_kelvin: 2200

- name: Living Room Night
  entities:
    light.sofa_light:
      state: on
      brightness_pct: 5
      color_temp_kelvin: 2000
    light.floor_light:
      state: on
      brightness_pct: 5
      color_temp_kelvin: 2000

- name: Living Room Reading
  entities:
    light.sofa_light:
      state: on
      brightness_pct: 100
      color_temp_kelvin: 4000
    light.floor_light:
      state: on
      brightness_pct: 70
      color_temp_kelvin: 4000

- name: Living Room Movie
  entities:
    light.sofa_light:
      state: off
    light.floor_light:
      state: on
      brightness_pct: 8
      color_temp_kelvin: 2000

- name: Living Room Sleep
  entities:
    light.sofa_light:
      state: off
    light.floor_light:
      state: on
      brightness_pct: 1
      color_temp_kelvin: 1800

- name: Living Room Away
  entities:
    light.sofa_light:
      state: off
    light.floor_light:
      state: off

